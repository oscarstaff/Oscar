<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Call Logger</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='7' fill='%232563eb'/><path d='M11.5 8.5c-1 0-1.9.8-1.9 1.9 0 6.6 5.4 12 12 12 1 0 1.9-.9 1.9-1.9v-2.2c0-.5-.4-1-.9-1.1l-3-.6c-.5-.1-1 .1-1.2.5l-.9 1.4c-2.3-1.1-4.1-3-5.2-5.2l1.4-.9c.4-.3.6-.8.5-1.2l-.6-3c-.1-.5-.6-.9-1.1-.9z' fill='%23fff'/><circle cx='22' cy='10' r='4.2' fill='%2322c55e' stroke='%232563eb' stroke-width='1.4'/><path d='M20.3 10l1.2 1.2 2.2-2.4' stroke='%23fff' stroke-width='1.4' stroke-linecap='round' stroke-linejoin='round' fill='none'/></svg>" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#f6f7f9; --surface:#fff; --surface-2:#f1f3f6; --border:#e3e6ea; --border-strong:#d3d7dd;
      --text:#0c1220; --text-2:#4a5262; --text-3:#727a8a; --text-4:#a2aab8;
      --accent:#2563eb; --accent-hover:#1d4ed8; --accent-soft:#eff4ff; --accent-border:#c7dbff;
      --ok:#059669; --ok-soft:#ecfdf5; --err:#dc2626; --err-soft:#fef2f2;
      --radius:10px; --radius-lg:16px;
      --font:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
      --shadow-sm:0 1px 2px rgba(0,0,0,.05);
      --shadow-md:0 4px 6px -1px rgba(0,0,0,.06),0 2px 4px -2px rgba(0,0,0,.06);
      --shadow-lg:0 12px 24px -8px rgba(0,0,0,.12);
      --shadow-xl:0 24px 48px -12px rgba(0,0,0,.16);
    }
    body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;line-height:1.6;-webkit-font-smoothing:antialiased;min-height:100vh}
    button,input,select,textarea{font-family:inherit;font-size:inherit}
    ::-webkit-scrollbar{width:7px;height:7px}
    ::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:10px}

    .wrap{max-width:520px;margin:0 auto;padding:40px 20px 80px;min-height:100vh;display:flex;flex-direction:column}
    .head{display:flex;align-items:center;gap:14px;margin-bottom:6px}
    .logo-badge{width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,#3b82f6,#2563eb);display:flex;align-items:center;justify-content:center;color:#fff;font-size:19px;box-shadow:0 6px 16px rgba(37,99,235,.3);flex-shrink:0}
    .head h1{font-size:22px;font-weight:800;letter-spacing:-.03em}
    .head h1 em{font-style:normal;color:var(--accent)}
    .head-sub{font-size:13px;color:var(--text-3);margin-top:1px}
    .whoami{margin-left:auto;text-align:right;font-size:12px;color:var(--text-3)}
    .whoami b{display:block;color:var(--text-2);font-size:12.5px;font-weight:600}

    .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);box-shadow:var(--shadow-md);padding:28px;margin-top:24px}
    .field{margin-bottom:18px}
    .field:last-of-type{margin-bottom:0}
    .field label{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:600;color:var(--text);margin-bottom:8px}
    .field label i{color:var(--text-4);font-size:12px;width:14px;text-align:center}
    .field label .req{color:var(--err);margin-left:1px}
    .inp{width:100%;border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;font-size:14px;color:var(--text);background:var(--surface);outline:none;transition:all .15s;box-shadow:var(--shadow-sm)}
    .inp::placeholder{color:var(--text-4)}
    .inp:hover{border-color:var(--border-strong)}
    .inp:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
    textarea.inp{resize:vertical;min-height:90px;line-height:1.5}
    .inp.bad{border-color:var(--err);background:var(--err-soft)}

    .actions{display:flex;gap:10px;margin-top:26px}
    .btn{flex:1;display:inline-flex;align-items:center;justify-content:center;gap:8px;border:1px solid var(--border);background:var(--surface);color:var(--text-2);font-weight:600;font-size:14px;padding:13px 18px;border-radius:var(--radius);cursor:pointer;transition:all .15s;box-shadow:var(--shadow-sm)}
    .btn:hover{background:var(--surface-2);color:var(--text);border-color:var(--border-strong)}
    .btn:disabled{opacity:.55;cursor:not-allowed}
    .btn-primary{flex:2;background:var(--accent);border-color:var(--accent);color:#fff}
    .btn-primary:hover{background:var(--accent-hover);border-color:var(--accent-hover);color:#fff;box-shadow:0 6px 16px rgba(37,99,235,.25)}

    .hint{font-size:12px;color:var(--text-4);text-align:center;margin-top:22px;display:flex;align-items:center;justify-content:center;gap:6px}
    .config-warn{margin-top:24px;padding:14px 16px;border-radius:var(--radius);background:var(--err-soft);border:1px solid #f5c9c9;color:#a12020;font-size:12.5px;line-height:1.5}

    .toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;padding:13px 24px;border-radius:30px;font-size:13.5px;font-weight:500;box-shadow:var(--shadow-xl);z-index:9999;display:inline-flex;align-items:center;gap:10px;animation:tin .24s cubic-bezier(.175,.885,.32,1.275)}
    @keyframes tin{from{opacity:0;transform:translate(-50%,12px)}to{opacity:1;transform:translate(-50%,0)}}
    .toast.ok{background:var(--ok)}
    .toast.err{background:var(--err)}
    .spin{animation:sp .7s linear infinite}
    @keyframes sp{to{transform:rotate(360deg)}}

    .recent{margin-top:26px}
    .recent-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text-4);margin-bottom:10px}
    .recent-row{display:flex;align-items:center;gap:12px;padding:11px 14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px;box-shadow:var(--shadow-sm);animation:slidein .3s ease both}
    @keyframes slidein{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}
    .recent-row .rt-ico{width:32px;height:32px;border-radius:9px;background:var(--ok-soft);color:var(--ok);display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
    .recent-row .rt-body{flex:1;min-width:0}
    .recent-row .rt-name{font-size:13.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .recent-row .rt-meta{font-size:11.5px;color:var(--text-3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .recent-row .rt-time{font-size:11px;color:var(--text-4);flex-shrink:0}
  </style>
</head>
<body>
<!-- NEXUS TOKEN GATE — app only opens when launched from Nexus -->
<div id="__gate" style="position:fixed;inset:0;z-index:99999;background:linear-gradient(135deg,#0f1117,#1a1d27);display:flex;align-items:center;justify-content:center;font-family:system-ui,sans-serif;">
  <div style="background:#1e2230;border:1px solid #2e3344;border-radius:18px;padding:40px 36px;width:min(380px,90vw);text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.5);">
    <div id="__gateLock" style="font-size:42px;margin-bottom:14px;cursor:default;user-select:none;">🔒</div>
    <div style="font-size:20px;font-weight:700;color:#fff;margin-bottom:8px;">Call Logger</div>
    <div id="__gateMsg" style="font-size:13.5px;color:#8b94a8;line-height:1.5;">Checking access…</div>
    <div id="__gatePwWrap" style="display:none;margin-top:18px;">
      <input id="__gatePw" type="password" inputmode="numeric" autocomplete="off" placeholder="Passcode"
        style="width:100%;padding:10px 12px;border-radius:10px;border:1px solid #2e3344;background:#151824;color:#fff;font-size:14px;text-align:center;letter-spacing:.3em;outline:none;" />
      <div id="__gatePwErr" style="font-size:11.5px;color:#e06b6b;margin-top:8px;min-height:14px;"></div>
    </div>
  </div>
</div>
<script>
(function(){
  var APP='dialtrac';
  var SECRET='oscars_nexus_gate_v1_8f3a2c91';
  var SB='https://jcfgldqrdbfkgbixszds.supabase.co';
  var KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpjZmdsZHFyZGJma2diaXhzemRzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1Nzc3NzEsImV4cCI6MjA5MDE1Mzc3MX0.Wj8cCpnlsoZOPj5sKWeEdfvgjG4Nc-UuTTYgbcrPfeI';
  window.NEXUS_SB=SB; window.NEXUS_KEY=KEY;
  function fail(m){var el=document.getElementById('__gateMsg');if(el){el.innerHTML=m+'<br><br><span style="color:#6b7585;font-size:12px;">Open this app from the Nexits page in Nexus.</span>';}}
  function pass(){var g=document.getElementById('__gate');if(g)g.remove(); if(window.__dtInit) window.__dtInit();}
  function hmacHex(secret,msg){var enc=new TextEncoder();return crypto.subtle.importKey('raw',enc.encode(secret),{name:'HMAC',hash:'SHA-256'},false,['sign']).then(function(k){return crypto.subtle.sign('HMAC',k,enc.encode(msg));}).then(function(s){return Array.from(new Uint8Array(s)).map(function(x){return x.toString(16).padStart(2,'0');}).join('');});}
  // ── Hidden test bypass: triple-click the lock, passcode 2006 ──
  (function(){
    var TEST_CODE='2006', clicks=0, timer=null;
    function reveal(){var w=document.getElementById('__gatePwWrap');if(!w)return;w.style.display='block';var pw=document.getElementById('__gatePw');if(pw)pw.focus();}
    function tryCode(){var pw=document.getElementById('__gatePw'),err=document.getElementById('__gatePwErr');if(!pw)return;if(pw.value===TEST_CODE){window.NEXUS_USER='Test Staff';try{sessionStorage.setItem('ngate_'+APP,'1');sessionStorage.setItem('ngate_name_'+APP,'Test Staff');}catch(e){}pass();}else{if(err)err.textContent='Incorrect passcode.';pw.value='';pw.focus();}}
    document.addEventListener('DOMContentLoaded',function(){
      var lock=document.getElementById('__gateLock');
      if(lock){lock.addEventListener('click',function(){clicks++;clearTimeout(timer);timer=setTimeout(function(){clicks=0;},800);if(clicks>=3){clicks=0;reveal();}});}
      var pw=document.getElementById('__gatePw');
      if(pw){pw.addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();tryCode();}});}
    });
  })();
  if(sessionStorage.getItem('ngate_'+APP)==='1'){ // still need the name for the sheet
    var savedName=sessionStorage.getItem('ngate_name_'+APP);
    if(savedName) window.NEXUS_USER=savedName;
    pass(); return;
  }
  (function(){
    (async function(){
      try{
        var hash=location.hash||'';
        var m=hash.match(/t=([^&]+)/);
        if(!m){fail('No access token.');return;}
        var token=decodeURIComponent(m[1]);
        var parts=token.split('.');
        if(parts.length!==2){fail('Invalid token.');return;}
        var b64=parts[0], sig=parts[1];
        var want=await hmacHex(SECRET,b64);
        if(want!==sig){fail('Token signature invalid.');return;}
        var payload=JSON.parse(decodeURIComponent(escape(atob(b64))));
        if(payload.app!==APP){fail('Token is for a different app.');return;}
        if(Date.now()>payload.exp){fail('Token expired — relaunch from Nexus.');return;}
        var name=payload.name||'';
        window.NEXUS_USER=name;
        var r=await fetch(SB+'/rest/v1/app_access?app=eq.'+APP+'&staff_name=eq.'+encodeURIComponent(name)+'&select=staff_name',{headers:{apikey:KEY,Authorization:'Bearer '+KEY}});
        var rows=r.ok?await r.json():[];
        if(!rows.length){fail('You no longer have access to this app.');return;}
        sessionStorage.setItem('ngate_'+APP,'1');
        try{ sessionStorage.setItem('ngate_name_'+APP, name); }catch(e){}
        try{history.replaceState(null,'',location.pathname+location.search);}catch(e){}
        pass();
      }catch(e){ fail('Access check failed.'); console.warn('gate',e); }
    })();
  })();
})();
</script>
<!-- END GATE -->

  <div class="wrap">
    <div class="head">
      <div class="logo-badge"><i class="fa-solid fa-phone-volume"></i></div>
      <div>
        <h1>Call <em>Logger</em></h1>
        <div class="head-sub">Log a call — one line straight to the sheet</div>
      </div>
      <div class="whoami"><b id="whoName">—</b><span>logging as</span></div>
    </div>

    <div class="card">
      <div class="field">
        <label><i class="fa-solid fa-user"></i> Name <span class="req">*</span></label>
        <input id="fName" class="inp" type="text" placeholder="Caller's name" autocomplete="off" />
      </div>
      <div class="field">
        <label><i class="fa-solid fa-phone"></i> Number</label>
        <input id="fNumber" class="inp" type="tel" placeholder="Contact number" autocomplete="off" />
      </div>
      <div class="field">
        <label><i class="fa-solid fa-circle-question"></i> Reason <span class="req">*</span></label>
        <input id="fReason" class="inp" type="text" placeholder="What was the call about?" autocomplete="off" />
      </div>
      <div class="field">
        <label><i class="fa-solid fa-note-sticky"></i> Note</label>
        <textarea id="fNote" class="inp" placeholder="Any extra detail (optional)"></textarea>
      </div>

      <div class="actions">
        <button class="btn" id="btnClear" type="button"><i class="fa-solid fa-eraser"></i> Clear</button>
        <button class="btn btn-primary" id="btnSave" type="button"><i class="fa-solid fa-paper-plane"></i> Log call</button>
      </div>

      <div id="configWarn" class="config-warn" style="display:none;">
        <i class="fa-solid fa-triangle-exclamation"></i> Not connected to a sheet yet. The Apps Script URL still needs to be set in this file (<code>DIALTRAC_URL</code>).
      </div>
    </div>

    <div class="recent" id="recentWrap" style="display:none;">
      <div class="recent-label">Logged this session</div>
      <div id="recentList"></div>
    </div>

    <div class="hint"><i class="fa-solid fa-lock"></i> Calls are appended to your team's Google Sheet</div>
  </div>

  <script>
    // ─────────────────────────────────────────────────────────────
    //  CONFIG — paste your deployed Apps Script Web App URL + token
    // ─────────────────────────────────────────────────────────────
    var DIALTRAC_URL   = 'PASTE_YOUR_APPS_SCRIPT_WEB_APP_URL_HERE';
    var DIALTRAC_TOKEN = 'dialtrac_oscars_2026_change_me'; // must match SHARED_TOKEN in Code.gs

    var sessionLog = [];

    window.__dtInit = function(){
      var who = window.NEXUS_USER || sessionStorage.getItem('ngate_name_dialtrac') || '';
      if(who){ window.NEXUS_USER = who; }
      document.getElementById('whoName').textContent = who || 'Unknown';
      if(!DIALTRAC_URL || DIALTRAC_URL.indexOf('PASTE_') === 0){
        document.getElementById('configWarn').style.display = 'block';
      }
    };

    function el(id){ return document.getElementById(id); }
    function toast(msg,type){
      var t=document.createElement('div');
      t.className='toast '+(type||'ok');
      t.innerHTML='<i class="fa-solid '+(type==='err'?'fa-circle-exclamation':type==='load'?'fa-spinner spin':'fa-circle-check')+'"></i><span>'+msg+'</span>';
      document.body.appendChild(t);
      if(type!=='load') setTimeout(function(){ t.remove(); },3000);
      return t;
    }

    function clearForm(){
      ['fName','fNumber','fReason','fNote'].forEach(function(id){ el(id).value=''; el(id).classList.remove('bad'); });
      el('fName').focus();
    }

    function addRecent(entry){
      sessionLog.unshift(entry);
      var wrap=el('recentWrap'), list=el('recentList');
      wrap.style.display='block';
      list.innerHTML = sessionLog.slice(0,8).map(function(e){
        var meta=[e.number,e.reason].filter(Boolean).join(' · ');
        return '<div class="recent-row"><div class="rt-ico"><i class="fa-solid fa-check"></i></div>'+
               '<div class="rt-body"><div class="rt-name">'+esc(e.name)+'</div>'+
               '<div class="rt-meta">'+esc(meta)+'</div></div>'+
               '<div class="rt-time">'+e.time+'</div></div>';
      }).join('');
    }
    function esc(s){ return (s||'').replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }

    async function saveCall(){
      var name=el('fName').value.trim();
      var number=el('fNumber').value.trim();
      var reason=el('fReason').value.trim();
      var note=el('fNote').value.trim();

      var bad=false;
      el('fName').classList.toggle('bad', !name); if(!name) bad=true;
      el('fReason').classList.toggle('bad', !reason); if(!reason) bad=true;
      if(bad){ toast('Name and reason are required','err'); return; }

      if(!DIALTRAC_URL || DIALTRAC_URL.indexOf('PASTE_')===0){
        toast('Sheet not connected yet','err'); return;
      }

      var btn=el('btnSave');
      btn.disabled=true;
      var loading=toast('Logging…','load');

      var payload={
        token: DIALTRAC_TOKEN,
        staff: window.NEXUS_USER || 'Unknown',
        name: name, number: number, reason: reason, note: note
      };

      try{
        // Apps Script web apps don't return CORS headers, so we can't read the
        // response body cross-origin. Use no-cors: the POST still delivers and
        // appends the row; we just can't inspect the reply. Validate inputs
        // client-side (done above) and treat a completed request as success.
        await fetch(DIALTRAC_URL, {
          method:'POST',
          mode:'no-cors',
          headers:{'Content-Type':'text/plain;charset=utf-8'},
          body: JSON.stringify(payload)
        });
        loading.remove();
        toast('Call logged','ok');
        addRecent({ name:name, number:number, reason:reason, time:new Date().toLocaleTimeString('en-AU',{hour:'2-digit',minute:'2-digit'}) });
        clearForm();
      }catch(e){
        loading.remove();
        console.error(e);
        toast('Could not reach the sheet','err');
      }finally{
        btn.disabled=false;
      }
    }

    document.addEventListener('DOMContentLoaded',function(){
      el('btnSave').addEventListener('click',saveCall);
      el('btnClear').addEventListener('click',clearForm);
      // Enter in any single-line field submits (except the note textarea)
      ['fName','fNumber','fReason'].forEach(function(id){
        el(id).addEventListener('keydown',function(e){ if(e.key==='Enter'){ e.preventDefault(); saveCall(); } });
      });
      // Always run init here too — the gate's pass() may have fired before this
      // script defined __dtInit (e.g. on refresh with an existing session), so
      // relying on the gate to call it isn't enough.
      if(window.__dtInit) window.__dtInit();
    });
  </script>
</body>
</html>
