<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Office Showdown · Nexits</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0e1320;--panel:#161d2e;--panel2:#1e2740;--border:#2a3550;
  --text:#eaf0fa;--dim:#8a96b0;
  --caffeine:#c97b3f;--paper:#e8d9a0;--tech:#4aa3e0;--chaos:#b14dff;--admin:#3fc98f;
  --hp-good:#3fc98f;--hp-mid:#ffce4a;--hp-low:#ff5a5a;
  --accent:#ffce4a;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;
  background-image:radial-gradient(circle at 50% -10%,rgba(255,206,74,.06),transparent 50%);}
.wrap{max-width:780px;margin:0 auto;padding:20px 16px 60px;}
.hero{text-align:center;padding:18px 0 22px;}
.hero h1{font-family:'Bebas Neue';font-size:clamp(34px,7vw,56px);letter-spacing:2px;line-height:1;
  background:linear-gradient(180deg,#ffce4a,#e0922a);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
.hero p{color:var(--dim);font-size:14px;margin-top:6px;}

.screen{display:none;}.screen.active{display:block;animation:fade .3s;}
@keyframes fade{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}

/* TEAM PREVIEW */
.section-label{font-family:'Bebas Neue';font-size:20px;letter-spacing:1px;color:var(--accent);margin:18px 0 10px;}
.mon-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;}
.mon-card{background:var(--panel);border:2px solid var(--border);border-radius:14px;padding:14px;cursor:pointer;transition:all .15s;position:relative;}
.mon-card:hover{border-color:var(--accent);transform:translateY(-2px);}
.mon-card.picked{border-color:var(--accent);background:var(--panel2);}
.mon-card .pick-num{position:absolute;top:8px;right:8px;width:22px;height:22px;border-radius:50%;background:var(--accent);color:#1a1a1a;font-weight:800;font-size:12px;display:flex;align-items:center;justify-content:center;}
.mon-emoji{font-size:34px;text-align:center;margin-bottom:6px;}
.mon-name{font-weight:700;font-size:15px;text-align:center;}
.mon-types{display:flex;gap:4px;justify-content:center;margin-top:6px;flex-wrap:wrap;}
.type-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;text-transform:uppercase;letter-spacing:.5px;color:#0e1320;}
.t-caffeine{background:var(--caffeine);}.t-paper{background:var(--paper);}.t-tech{background:var(--tech);}.t-chaos{background:var(--chaos);color:#fff;}.t-admin{background:var(--admin);}
.mon-stats{margin-top:8px;font-size:10px;color:var(--dim);display:grid;grid-template-columns:1fr 1fr;gap:1px 8px;}

.btn{font-family:'Outfit';font-weight:700;font-size:15px;border:none;border-radius:12px;padding:13px 26px;cursor:pointer;transition:transform .12s,box-shadow .12s;}
.btn-primary{background:linear-gradient(135deg,#ffce4a,#e0922a);color:#1a1a1a;box-shadow:0 4px 14px rgba(255,206,74,.3);}
.btn-primary:hover{transform:translateY(-2px);}
.btn-primary:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-ghost{background:var(--panel2);border:1.5px solid var(--border);color:var(--text);}

/* BATTLE */
/* ── BATTLE SCENE (Pokémon Showdown layout) ── */
.scene{position:relative;width:100%;aspect-ratio:16/9;max-height:420px;border-radius:14px;overflow:hidden;margin-bottom:14px;
  background:
    linear-gradient(180deg,#bfe3f2 0%,#a5d4ec 38%,#cdeaf3 38%,#e8f6fb 100%);
  border:1px solid var(--border);}
/* sky cliff band at top */
.scene::before{content:'';position:absolute;top:0;left:0;right:0;height:38%;
  background:linear-gradient(180deg,#8a6f5a,#6f5644);
  background-image:repeating-linear-gradient(115deg,rgba(255,255,255,.05) 0 14px,rgba(0,0,0,.05) 14px 30px);}
/* water shimmer lines on lower half */
.scene::after{content:'';position:absolute;bottom:0;left:0;right:0;height:62%;pointer-events:none;
  background:repeating-linear-gradient(180deg,transparent 0 16px,rgba(255,255,255,.18) 16px 18px);opacity:.5;}

.turn-pill{position:absolute;top:12px;left:12px;z-index:20;background:#fffef5;border:2px solid #3a3327;border-radius:10px;
  padding:4px 14px;font-family:'Bebas Neue';font-size:20px;letter-spacing:1px;color:#3a3327;box-shadow:2px 2px 0 rgba(0,0,0,.2);}

/* platforms (oval shadows the mons stand on) */
.platform{position:absolute;border-radius:50%;z-index:5;}
.enemy-plat{width:140px;height:34px;right:16%;top:30%;background:radial-gradient(ellipse,rgba(120,160,90,.55),transparent 70%);}
.player-plat{width:190px;height:44px;left:8%;bottom:9%;background:radial-gradient(ellipse,rgba(120,160,90,.55),transparent 70%);}

/* field sprites */
.field-mon{position:absolute;z-index:10;}
.enemy-mon{right:17%;top:13%;}
.player-mon{left:10%;bottom:10%;}

/* floating HP boxes */
.hpbox{position:absolute;z-index:15;background:#fffef5;border:2px solid #3a3327;border-radius:8px;padding:6px 10px 7px;min-width:200px;box-shadow:2px 2px 0 rgba(0,0,0,.2);}
.hpbox.enemy{top:11%;left:6%;}
.hpbox.player{bottom:24%;right:6%;}
.hpbox .nl{display:flex;justify-content:space-between;align-items:baseline;gap:8px;margin-bottom:3px;}
.hpbox .nm{font-weight:800;font-size:14px;color:#2a2419;}
.hpbox .lv{font-size:11px;font-weight:700;color:#5a5040;}
.hpbox .status-chip{font-size:8px;font-weight:700;padding:1px 5px;border-radius:6px;text-transform:uppercase;margin-left:4px;}
.st-brn{background:#ff5a3f;color:#fff;}.st-par{background:#ffce4a;color:#1a1a1a;}.st-slp{background:#9c7bff;color:#fff;}
.hpline{display:flex;align-items:center;gap:6px;}
.hpline .lbl{font-size:9px;font-weight:800;color:#c9a227;font-family:'Bebas Neue';letter-spacing:.5px;}
.hp-bar{flex:1;height:8px;background:#3a3327;border-radius:5px;overflow:hidden;padding:1px;}
.hp-fill{height:100%;border-radius:4px;transition:none;}
.hp-text{font-size:10px;color:#5a5040;margin-top:2px;text-align:right;font-variant-numeric:tabular-nums;font-weight:700;}

/* poke-ball team trackers */
.balls{position:absolute;z-index:15;display:flex;gap:5px;}
.enemy-balls{top:7%;left:6%;}
.player-balls{bottom:20%;right:6%;}
.ball{width:13px;height:13px;border-radius:50%;background:radial-gradient(circle at 50% 35%,#fff 0 40%,#e23b3b 42%);border:1.5px solid #3a3327;position:relative;}
.ball::after{content:'';position:absolute;left:0;right:0;top:50%;height:1.5px;background:#3a3327;transform:translateY(-50%);}
.ball.dead{background:#9aa;opacity:.4;}

/* compatibility shim for old animation classes targeting .field-mon */
.field-mon.fainted{opacity:.35;filter:grayscale(1);}

.log{background:#0a0e18;border:1px solid var(--border);border-radius:12px;padding:14px 16px;height:90px;overflow-y:auto;font-size:13px;line-height:1.6;margin-bottom:14px;}
.log .turn-sep{color:var(--accent);font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:1px;margin-top:6px;}
.log .eff{color:var(--hp-good);}.log .noteff{color:var(--dim);}.log .crit{color:var(--hp-low);font-weight:700;}

.controls{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:14px;}
.ctrl-prompt{font-size:13px;color:var(--dim);margin-bottom:10px;}
.ctrl-prompt b{color:var(--text);}
.move-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.move-btn{background:var(--panel2);border:2px solid var(--border);border-radius:11px;padding:11px 12px;cursor:pointer;text-align:left;transition:all .12s;}
.move-btn:hover{border-color:var(--accent);}
.move-btn:disabled{opacity:.4;cursor:not-allowed;}
.move-name{font-weight:700;font-size:13px;display:flex;justify-content:space-between;align-items:center;}
.move-meta{font-size:10px;color:var(--dim);margin-top:3px;display:flex;gap:8px;}
.move-cat{font-size:9px;padding:1px 6px;border-radius:7px;font-weight:700;text-transform:uppercase;}
.cat-phys{background:#e0762a;color:#fff;}.cat-spec{background:#4a8fe0;color:#fff;}.cat-status{background:#8a96b0;color:#fff;}
.switch-row{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;}
.switch-btn{background:var(--panel2);border:1.5px solid var(--border);border-radius:10px;padding:8px 12px;cursor:pointer;font-size:12px;font-weight:600;display:flex;align-items:center;gap:6px;transition:all .12s;}
.switch-btn:hover:not(:disabled){border-color:var(--admin);}
.switch-btn:disabled{opacity:.35;cursor:not-allowed;}
.back-link{background:none;border:none;color:var(--dim);font-family:'Outfit';font-weight:600;font-size:14px;cursor:pointer;padding:6px 0;}
.back-link:hover{color:var(--accent);}

.result-overlay{position:fixed;inset:0;background:rgba(8,12,20,.9);display:none;align-items:center;justify-content:center;z-index:100;}
.result-overlay.show{display:flex;}
.result-box{text-align:center;}
.result-box h2{font-family:'Bebas Neue';font-size:64px;letter-spacing:2px;}
.result-box.win h2{color:var(--accent);}.result-box.lose h2{color:var(--hp-low);}

.teampick-bar{display:flex;gap:8px;align-items:center;margin-top:14px;flex-wrap:wrap;}
.footer-note{text-align:center;color:var(--dim);font-size:12px;margin-top:28px;line-height:1.6;}

/* ── PIXEL SPRITE ANIMATIONS ── */
.sprite{image-rendering:pixelated;background-repeat:no-repeat;background-position:0 0;margin:0 auto;display:block;}
.sprite.idle{animation:spriteIdle var(--dur,0.8s) steps(var(--frames,1)) infinite;}
@keyframes spriteIdle{from{background-position:0 0;}to{background-position:var(--strip,0) 0;}}
/* enemy sprites face left by default; flip the player's to face the enemy */
.sprite.flip{transform:scaleX(-1);}
.field-mon.hit .sprite{animation:hitShake .4s;}
@keyframes hitShake{0%,100%{transform:translateX(0);}20%{transform:translateX(-6px);filter:brightness(3);}40%{transform:translateX(6px);filter:brightness(3);}60%{transform:translateX(-4px);}80%{transform:translateX(4px);}}
.field-mon.hit.flip .sprite{animation:hitShakeFlip .4s;}
@keyframes hitShakeFlip{0%,100%{transform:scaleX(-1) translateX(0);}20%{transform:scaleX(-1) translateX(-6px);filter:brightness(3);}40%{transform:scaleX(-1) translateX(6px);filter:brightness(3);}60%{transform:scaleX(-1) translateX(-4px);}80%{transform:scaleX(-1) translateX(4px);}}
.field-mon.lunge .sprite{animation:lunge .35s ease-out;}
@keyframes lunge{0%{transform:translate(0,0);}40%{transform:translate(18px,-6px);}100%{transform:translate(0,0);}}
.field-mon.lunge.flip .sprite{animation:lungeFlip .35s ease-out;}
@keyframes lungeFlip{0%{transform:scaleX(-1) translate(0,0);}40%{transform:scaleX(-1) translate(18px,-6px);}100%{transform:scaleX(-1) translate(0,0);}}
.field-mon.entering .sprite{animation:enterSlide .4s ease-out;}
@keyframes enterSlide{from{opacity:0;transform:translateY(-14px);}to{opacity:1;transform:none;}}
.field-mon.fainting .sprite{animation:faintFade .6s ease-in forwards;}
@keyframes faintFade{to{opacity:0;transform:translateY(16px) scale(.7);filter:grayscale(1);}}
.roster-sprite{image-rendering:pixelated;background-repeat:no-repeat;margin:0 auto 6px;display:block;animation:spriteIdle var(--dur,0.8s) steps(var(--frames,1)) infinite;}

/* ── EMULATOR-STYLE BATTLE FX ── */
/* classic damage flicker — sprite blinks rapidly */
.field-mon.flicker .sprite{animation:dmgFlicker .6s steps(1) 1;}
@keyframes dmgFlicker{0%,32%,64%{opacity:1;}16%,48%,80%{opacity:.15;}100%{opacity:1;}}
.field-mon.flicker.flip .sprite{animation:dmgFlickerFlip .6s steps(1) 1;}
@keyframes dmgFlickerFlip{0%,32%,64%{opacity:1;transform:scaleX(-1);}16%,48%,80%{opacity:.15;transform:scaleX(-1);}100%{opacity:1;transform:scaleX(-1);}}
/* slide-down faint (sinks below HP box like GBA) */
.field-mon.faint-slide .sprite{animation:faintSlide .7s ease-in forwards;}
@keyframes faintSlide{0%{opacity:1;transform:translateY(0);}100%{opacity:0;transform:translateY(60px);clip-path:inset(100% 0 0 0);}}
.field-mon.faint-slide.flip .sprite{animation:faintSlideFlip .7s ease-in forwards;}
@keyframes faintSlideFlip{0%{opacity:1;transform:scaleX(-1) translateY(0);}100%{opacity:0;transform:scaleX(-1) translateY(60px);clip-path:inset(100% 0 0 0);}}
/* slide-in intro */

.field-mon.intro-enemy .sprite{animation:introR .6s ease-out;}
@keyframes introR{from{opacity:0;transform:translateX(120px);}to{opacity:1;transform:none;}}
.field-mon.intro-player .sprite{animation:introL .6s ease-out;}
@keyframes introL{from{opacity:0;transform:scaleX(-1) translateX(-120px);}to{opacity:1;transform:scaleX(-1);}}
/* screen shake on the battlefield */
.battlefield.shake{animation:bfShake .4s;}
@keyframes bfShake{0%,100%{transform:translate(0,0);}15%{transform:translate(-5px,3px);}30%{transform:translate(5px,-3px);}45%{transform:translate(-4px,-2px);}60%{transform:translate(4px,2px);}75%{transform:translate(-2px,1px);}}
/* super-effective screen flash */
.battlefield.flash::after{content:'';position:absolute;inset:0;background:#fff;opacity:0;pointer-events:none;animation:seFlash .35s;border-radius:18px;}
@keyframes seFlash{0%{opacity:0;}30%{opacity:.55;}100%{opacity:0;}}

/* ── MOVE EFFECT OVERLAYS (per-type) ── */
.fx{position:absolute;pointer-events:none;z-index:30;left:0;top:0;width:100%;height:100%;overflow:visible;}
.fx-layer{position:absolute;inset:0;}
/* Caffeine — hot beam + steam puffs */
.fx-caffeine .beam{position:absolute;top:42%;height:8px;border-radius:4px;background:linear-gradient(90deg,#ffce4a,#e0762a);box-shadow:0 0 14px #e0762a;animation:beamShoot .4s ease-out;transform-origin:left center;}
@keyframes beamShoot{from{width:0;opacity:0;}40%{opacity:1;}to{width:100%;opacity:.9;}}
.fx-caffeine .puff{position:absolute;width:16px;height:16px;border-radius:50%;background:radial-gradient(circle,#ffce4a,transparent 70%);animation:puffUp .6s ease-out forwards;}
@keyframes puffUp{from{transform:translateY(0) scale(.4);opacity:.9;}to{transform:translateY(-30px) scale(1.4);opacity:0;}}
/* Paper — spinning slash sheets */
.fx-paper .slash{position:absolute;width:60px;height:60px;border:4px solid #e8d9a0;border-radius:6px;transform:rotate(0deg);animation:paperSpin .5s ease-out forwards;box-shadow:0 0 10px #e8d9a0;}
@keyframes paperSpin{from{transform:rotate(0) scale(.3);opacity:1;}to{transform:rotate(280deg) scale(1.3);opacity:0;}}
/* Tech — glitch bars + scanline */
.fx-tech .glitch{position:absolute;height:6px;background:#4aa3e0;box-shadow:0 0 8px #4aa3e0;animation:glitchFlick .5s steps(3) forwards;}
@keyframes glitchFlick{0%{opacity:0;transform:translateX(-20px);}30%{opacity:1;}60%{transform:translateX(20px);}100%{opacity:0;}}
/* Chaos — swirling purple orbs */
.fx-chaos .orb{position:absolute;width:14px;height:14px;border-radius:50%;background:radial-gradient(circle,#d49bff,#b14dff 60%,transparent);box-shadow:0 0 12px #b14dff;animation:chaosSwirl .7s ease-in-out forwards;}
@keyframes chaosSwirl{from{transform:rotate(0) translateX(0) scale(.5);opacity:1;}to{transform:rotate(360deg) translateX(26px) scale(1.2);opacity:0;}}
/* Admin — stamp slam */
.fx-admin .stamp{position:absolute;top:30%;left:30%;width:46px;height:46px;border:5px solid #3fc98f;border-radius:8px;color:#3fc98f;font-weight:800;font-size:11px;display:flex;align-items:center;justify-content:center;animation:stampHit .5s cubic-bezier(.2,2,.4,1) forwards;}
@keyframes stampHit{from{transform:scale(2.5);opacity:0;}50%{transform:scale(1);opacity:1;}100%{transform:scale(1);opacity:0;}}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>
<div class="wrap">

  <!-- MENU / TEAM PREVIEW -->
  <div class="screen active" id="screen-menu">
    <div class="hero"><h1>OFFICE SHOWDOWN</h1><p>Pokémon-style 1v1 battles. Pick your team of 4, send them out one at a time.</p></div>
    <div class="section-label">Choose your team — tap 4 creatures</div>
    <div class="mon-grid" id="rosterGrid"></div>
    <div class="teampick-bar">
      <button class="btn btn-primary" id="startBtn" disabled onclick="startBattle()">⚔ Solo vs CPU</button>
      <button class="btn btn-ghost" id="pvpBtn" disabled onclick="openLobby()">👥 Battle a coworker</button>
      <span id="pickStatus" style="color:var(--dim);font-size:13px;"></span>
    </div>
    <div class="footer-note">Type chart: ☕ Caffeine › 📝 Paper › 🖥️ Tech › ☕ Caffeine · 📅 Chaos ⇄ 📎 Admin<br>Part of Nexits · take a real break too 🌿</div>
  </div>

  <!-- LOBBY (PvP) -->
  <div class="screen" id="screen-lobby">
    <div class="hero" style="padding-bottom:10px;"><h1 style="font-size:clamp(28px,6vw,44px);">PvP LOBBY</h1></div>
    <div style="text-align:center;margin-bottom:14px;">
      <label style="font-size:12px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;">Your name</label><br>
      <input id="pvpName" placeholder="First name" style="margin-top:6px;background:var(--panel);border:1.5px solid var(--border);color:var(--text);border-radius:10px;padding:10px 14px;font-size:15px;text-align:center;width:200px;">
    </div>
    <div style="display:flex;gap:10px;justify-content:center;margin-bottom:20px;flex-wrap:wrap;">
      <button class="btn btn-primary" onclick="createBattle()">+ Create challenge</button>
      <button class="btn btn-ghost" onclick="refreshLobby()">↻ Refresh</button>
      <button class="btn btn-ghost" onclick="leaveLobby()">← Back</button>
    </div>
    <div class="section-label" style="text-align:center;">Open challenges</div>
    <div id="lobbyList" style="max-width:480px;margin:0 auto;"></div>
    <div id="lobbyStatus" style="text-align:center;color:var(--dim);font-size:13px;margin-top:14px;"></div>
  </div>

  <!-- BATTLE -->
  <div class="screen" id="screen-battle">
    <button class="back-link" onclick="quitBattle()">← Forfeit</button>
    <div class="scene" id="scene">
      <div class="turn-pill" id="turnPill">Turn 1</div>
      <!-- enemy: far top-right -->
      <div class="hpbox enemy" id="enemyHP"></div>
      <div class="platform enemy-plat"></div>
      <div class="field-mon enemy-mon" id="enemyMon"></div>
      <!-- player: near bottom-left, back-facing -->
      <div class="hpbox player" id="playerHP"></div>
      <div class="platform player-plat"></div>
      <div class="field-mon player-mon" id="playerMon"></div>
      <!-- team trackers (poke-ball dots) -->
      <div class="balls enemy-balls" id="enemyBalls"></div>
      <div class="balls player-balls" id="playerBalls"></div>
    </div>
    <div class="log" id="battleLog"></div>
    <div class="controls" id="battleControls"></div>
  </div>

  <div class="result-overlay" id="resultOverlay">
    <div class="result-box" id="resultBox">
      <h2 id="resultText">—</h2>
      <button class="btn btn-primary" style="margin-top:20px;" onclick="backToMenu()">Play again</button>
    </div>
  </div>

async function onBattleUpdate(b){
  if(!pvp)return;
  // both joined → start
  if(b.status==='active' && !pvp.started){
    pvp.started=true;
    startPvpBattle(b);
    return;
  }
  // a turn's actions changed → host checks if both in
  if(pvp.role==='host' && b.status==='active' && pvp.started){
    if(b.host_action && b.guest_action && !pvp.resolvingTurn){
      pvp.resolvingTurn=true;
      await hostResolveTurn(b.host_action,b.guest_action);
      pvp.resolvingTurn=false;
    }
  }
  // guest receives resolved state
  if(pvp.role==='guest' && b.state && b.turn!==pvp.lastSeenTurn){
    pvp.lastSeenTurn=b.turn;
    guestApplyState(b);
  }
  // finished
  if(b.status==='finished' && !pvp.ended){
    pvp.ended=true;
    const iWon=(b.winner===pvp.name);
    endBattle(iWon);
  }
}

// seeded RNG so host resolution is reproducible/fair
function makeRNG(seed){let s=seed>>>0;return function(){s=(s*1664525+1013904223)>>>0;return s/4294967296;};}

function startPvpBattle(b){
  // host's team is "player" for host; for guest, swap perspective
  const mine = pvp.role==='host' ? b.host_team : b.guest_team;
  const theirs = pvp.role==='host' ? b.guest_team : b.host_team;

// HOST: both actions present → resolve authoritatively, write state, clear actions
async function hostResolveTurn(hostAction,guestAction){
  // host perspective: player=host, enemy=guest
  const pAction = hostAction;
  const eAction = guestAction;
  await resolveTurn(pAction,eAction); // uses existing engine + animations on host screen
  // serialize state for the guest
  const c=sbClient();
  const snap=serializeBattle();
  let winner=null,status='active';
  if(!battle.player.team.some(m=>!m.fainted)){winner=battle.enemy.name;status='finished';}
  else if(!battle.enemy.team.some(m=>!m.fainted)){winner=battle.player.name;status='finished';}
  await c.from('showdown_battles').update({state:snap,turn:battle.turn,host_action:null,guest_action:null,status:status,winner:winner}).eq('id',pvp.id);
}
function serializeBattle(){
  const ser=s=>({active:battle[s].active,name:battle[s].name,team:battle[s].team.map(m=>({id:m.id,hp:m.hp,status:m.status,boosts:m.boosts,fainted:m.fainted}))});
  return {player:ser('player'),enemy:ser('enemy'),turn:battle.turn,log:battle.log.slice(-30)};
}
// GUEST: apply the host-computed state (host's player = guest's enemy, swap)
function guestApplyState(b){
  const st=b.state;if(!st)return;
  // host's "player" is the host; from guest's view that's the enemy
  const applySide=(fromObj,toSide)=>{
    battle[toSide].active=fromObj.active;
    fromObj.team.forEach((sm,i)=>{const m=battle[toSide].team[i];if(m){m.hp=sm.hp;m.status=sm.status;m.boosts=sm.boosts;m.fainted=sm.fainted;}});
  };
  applySide(st.player,'enemy'); // host player -> guest enemy
  applySide(st.enemy,'player'); // host enemy -> guest player
  battle.turn=st.turn;
  battle.log=st.log||battle.log;
  document.getElementById('battleLog').innerHTML=battle.log.slice(-30).join('<br>');
  renderBattle();
  // continue if not finished (host already auto-replaced fainted mons in the state)
  if(b.status!=='finished'){ promptPlayerAction(); }
}

function spriteHTML(cid,size,flip,cls){

  const scale=size/sp.fh;
  const dispW=Math.round(sp.fw*scale), dispH=Math.round(sp.fh*scale);
  const stripW=dispW*sp.frames;
  const dur=(0.5+sp.frames*0.18).toFixed(2)+'s';
  return '<div class="'+(cls||'sprite')+(flip?' flip':'')+'" style="width:'+dispW+'px;height:'+dispH+'px;'+

    '--frames:'+sp.frames+';--strip:-'+stripW+'px;--dur:'+dur+';"></div>';

// smooth HP bar drain + counting number (emulator-style)
function drainHP(s,fromHP,toHP,maxhp){
  return new Promise(res=>{
    const el=document.getElementById(s==='enemy'?'enemyHP':'playerHP');if(!el){res();return;}
    const isEnemy=(s==='enemy');
    const fill=el.querySelector('.hp-fill');const txt=el.querySelector('.hp-text');
    const dur=Math.min(900,Math.max(300,(fromHP-toHP)/maxhp*1400));
    const start=performance.now();
    function step(now){
      const p=Math.min(1,(now-start)/dur);
      const cur=fromHP+(toHP-fromHP)*p;
      const frac=Math.max(0,cur)/maxhp;
      if(fill){fill.style.width=(frac*100)+'%';fill.style.background=hpColor(frac);}
      if(txt)txt.textContent=isEnemy?(Math.round(frac*100)+'%'):(Math.max(0,Math.ceil(cur))+' / '+maxhp);
      if(p<1)requestAnimationFrame(step);else res();
    }
    requestAnimationFrame(step);
  });
}

// ═══════════════ ENEMY AI ═══════════════
function chooseEnemyAction(){
  const m=activeMon('enemy');
  if(!m||m.fainted)return null;
  const foe=activeMon('player');
  if(!foe)return null;
  // consider switching if current mon is badly walled (rare)
  let best={score:-1};
  m.moves.forEach(mvId=>{
    const mv=MOVES[mvId];
    if(mv.cat==='status'){
      let s=0;
      if(mv.heal&&m.hp/m.maxhp<0.45)s=70;
      else if(mv.protect)s=10+Math.random()*12;
      else if(mv.status&&!foe.status)s=32+Math.random()*18;
      else if(mv.boost&&m.hp/m.maxhp>0.6)s=28;
      if(s>best.score)best={score:s,mvId};
    }else{
      const eff=typeMult(mv.type,foe.types);
      const s=(mv.power||0)*eff*(0.85+Math.random()*0.3);
      if(s>best.score)best={score:s,mvId};
    }
  });
  return {type:'move',mvId:best.mvId};
}

// ═══════════════ TURN RESOLUTION ═══════════════
function statOf(m,key){
  let v=m.stats[key];
  const b=m.boosts[key]||0;
  v=Math.floor(v*(b>=0?(2+b)/2:2/(2-b)));
  if(key==='spe'&&m.status==='par')v=Math.floor(v*0.5);
  return v;
}
const sleep=ms=>new Promise(r=>setTimeout(r,ms));
let resolving=false;
async function resolveTurn(pAction,eAction){
  resolving=true;
  battle.turn++;
  renderBattle();
  logLine('<span class="turn-sep">Turn '+battle.turn+'</span>');
  [battle.player.team,battle.enemy.team].forEach(t=>t.forEach(m=>m.protect=false));
  // build actions
  let acts=[];
  if(pAction)acts.push({side:'player',...pAction});
  if(eAction)acts.push({side:'enemy',...eAction});
  // switches first
  acts.filter(a=>a.type==='switch').forEach(doSwitch);
  renderBattle();
  // moves ordered by speed
  let moves=acts.filter(a=>a.type==='move');
  moves.forEach(a=>{const m=activeMon(a.side);a._spe=m?statOf(m,'spe'):0;});
  moves.sort((x,y)=>y._spe-x._spe||Math.random()-0.5);
  for(const a of moves){ await executeMove(a); if(checkEnd()){resolving=false;return;} await sleep(550); }
  renderBattle();
  if(checkEnd()){resolving=false;return;}
  await handleFaintsThenContinue();
  resolving=false;
}
function doSwitch(a){
  battle[a.side].active=a.benchIdx;
  const nu=activeMon(a.side);
  logLine((a.side==='player'?'You':'Opponent')+' sent out '+nu.name+'!');
  renderMon(a.side);renderHP(a.side);
  const el=monElS(a.side);if(el){el.classList.add(a.side==='player'?'intro-player':'intro-enemy');setTimeout(()=>el.classList.remove('intro-player','intro-enemy'),500);}
}
async function executeMove(a){
  const m=activeMon(a.side);
  if(!m||m.fainted)return;
  const mv=MOVES[a.mvId];
  if(m.status==='par'&&Math.random()<0.25){logLine(m.name+' is paralyzed and can\'t move!');return;}
  logLine('<b>'+m.name+'</b> used <b>'+mv.name+'</b>!');
  if(mv.cat!=='status'){animate(a.side,'lunge',350);await sleep(180);}
  const foeSide=a.side==='player'?'enemy':'player';
  // status / self moves
  if(mv.cat==='status'){
    if(mv.protect){m.protect=true;logLine(m.name+' protected itself!');return;}
    if(mv.heal){const from=m.hp;m.hp=Math.min(m.maxhp,m.hp+Math.floor(m.maxhp*mv.heal));logLine(m.name+' recovered HP.');await drainHP(a.side,from,m.hp,m.maxhp);return;}
    if(mv.boost){Object.entries(mv.boost).forEach(([k,v])=>{m.boosts[k]=Math.min(6,(m.boosts[k]||0)+v);});logLine(m.name+'\'s stats rose!');return;}
    if(mv.status){
      const t=activeMon(foeSide);
      if(!t||t.fainted){logLine('But it failed.');return;}
      if(t.protect){logLine(t.name+' protected itself!');return;}
      if(Math.random()*100>(mv.acc||100)){logLine('It missed!');return;}
      if(t.status){logLine(t.name+' already has a status.');return;}
      playMoveFX(foeSide,mv.type);await sleep(280);
      t.status=mv.status;logLine(t.name+' was '+(mv.status==='brn'?'burned':mv.status==='par'?'paralyzed':'afflicted')+'!');renderHP(foeSide);return;
    }
    return;
  }
  // damaging
  const t=activeMon(foeSide);
  if(!t||t.fainted){logLine('But there was no target.');return;}
  if(Math.random()*100>(mv.acc||100)){logLine('It missed!');return;}
  if(t.protect){logLine(t.name+' protected itself!');return;}
  const dmg=calcDamage(m,t,mv,false);
  const fromHP=t.hp;
  t.hp=Math.max(0,t.hp-dmg.amount);
  playMoveFX(foeSide,mv.type);
  await sleep(280);
  animate(foeSide,'flicker',600);
  bfShake();
  if(dmg.eff>1)bfFlash();
  let msg='';
  if(dmg.eff>1)msg=' <span class="eff">Super effective!</span>';
  else if(dmg.eff<1&&dmg.eff>0)msg=' <span class="noteff">Not very effective…</span>';
  else if(dmg.eff===0)msg=' <span class="noteff">No effect.</span>';
  if(dmg.crit)msg=' <span class="crit">Critical hit!</span>'+msg;
  logLine('→ '+t.name+' took '+dmg.amount+' damage.'+msg);
  await drainHP(foeSide,fromHP,t.hp,t.maxhp);
  await sleep(160);
  if(t.hp<=0){t.fainted=true;logLine('<b>'+t.name+' fainted!</b>');const el=monElS(foeSide);if(el){el.classList.add('faint-slide');await sleep(720);}renderBalls(foeSide);}
}
function calcDamage(atk,def,mv,spread){
  const eff=typeMult(mv.type,def.types);
  if(eff===0)return{amount:0,eff:0,crit:false};
  const isPhys=mv.cat==='phys';
  const A=statOf(atk,isPhys?'atk':'spa');
  const D=statOf(def,isPhys?'def':'spd');
  const stab=atk.types.includes(mv.type)?1.5:1;
  const crit=Math.random()<0.0625;
  const critMult=crit?1.5:1;
  const rand=0.85+Math.random()*0.15;
  const spreadMult=spread?0.75:1;
  let burnMult=(isPhys&&atk.status==='brn')?0.5:1;
  const base=(((2*50/5+2)*mv.power*A/D)/50)+2;
  const amount=Math.max(1,Math.floor(base*stab*eff*critMult*rand*spreadMult*burnMult));
  return{amount,eff,crit};
}

// ═══════════════ FAINTS / END ═══════════════
async function handleFaintsThenContinue(){
  // end-of-turn burn damage
  for(const s of ['player','enemy']){
    const m=activeMon(s);
    if(m&&!m.fainted&&m.status==='brn'){const from=m.hp;m.hp=Math.max(0,m.hp-Math.floor(m.maxhp/16));logLine(m.name+' is hurt by its burn.');await drainHP(s,from,m.hp,m.maxhp);if(m.hp<=0){m.fainted=true;logLine('<b>'+m.name+' fainted!</b>');const el=monElS(s);if(el){el.classList.add('faint-slide');await sleep(700);}renderBalls(s);}}
  }
  if(checkEnd())return;
  await sleep(250);
  // enemy auto-replaces
  if(activeMon('enemy').fainted){
    const bench=battle.enemy.team.map((mm,i)=>({mm,i})).filter(x=>!x.mm.fainted);
    if(bench.length){battle.enemy.active=bench[0].i;logLine('Opponent sent out '+bench[0].mm.name+'!');renderMon('enemy');renderHP('enemy');const el=monElS('enemy');if(el){el.classList.add('intro-enemy');setTimeout(()=>el.classList.remove('intro-enemy'),500);}await sleep(500);}
  }
  if(checkEnd())return;
  // player replacement
  if(activeMon('player').fainted){
    if(battle.pvp){
      // auto-replace in PvP to keep both clients in sync (no interactive pick)
      const bench=battle.player.team.map((mm,i)=>({mm,i})).filter(x=>!x.mm.fainted);
      if(bench.length){battle.player.active=bench[0].i;logLine('You sent out '+activeMon('player').name+'!');renderMon('player');renderHP('player');const el=monElS('player');if(el){el.classList.add('intro-player');setTimeout(()=>el.classList.remove('intro-player'),500);}await sleep(500);}
    }else{
      promptReplacement();
      return; // wait for player pick
    }
  }
  if(battle.pvp){
    // only the host drives the next prompt cycle; guest waits for state echo then prompts
    if(pvp&&pvp.role==='host') promptPlayerAction();
    return;
  }
  promptPlayerAction();
}
function promptReplacement(){
  const c=document.getElementById('battleControls');
  const bench=battle.player.team.map((mm,i)=>({mm,i})).filter(x=>!x.mm.fainted);
  let html='<div class="ctrl-prompt"><b>'+activeMon('player').name+'</b> fainted! Choose your next creature:</div><div class="switch-row">';
  bench.forEach(x=>{html+='<button class="switch-btn" onclick="doReplacement('+x.i+')">↻ '+x.mm.name+' <span style="color:var(--dim);font-size:11px;">'+Math.ceil(x.mm.hp)+'/'+x.mm.maxhp+'</span></button>';});
  html+='</div>';
  c.innerHTML=html;
}
function doReplacement(idx){
  if(battle&&battle.pvp){ playerAction={type:'switch',benchIdx:idx}; pvpSubmit(playerAction); return; }
  battle.player.active=idx;
  const nu=activeMon('player');
  logLine('You sent out '+nu.name+'!');
  renderMon('player');renderHP('player');
  const el=monElS('player');if(el){el.classList.add('intro-player');setTimeout(()=>el.classList.remove('intro-player'),500);}
  setTimeout(promptPlayerAction,400);
}
function teamAlive(s){return battle[s].team.some(m=>!m.fainted);}
function checkEnd(){
  if(!battle)return true;
  if(!teamAlive('enemy')){endBattle(true);return true;}
  if(!teamAlive('player')){endBattle(false);return true;}
  return false;
}
function endBattle(win){
  const ov=document.getElementById('resultOverlay');
  const box=document.getElementById('resultBox');
  box.className='result-box '+(win?'win':'lose');
  document.getElementById('resultText').textContent=win?'YOU WIN! 🎉':'DEFEATED';
  if(win){try{let w=parseInt(localStorage.getItem('showdown_wins'))||0;localStorage.setItem('showdown_wins',w+1);}catch(e){}}
  ov.classList.add('show');
  if(pvp){cleanupPvp();}
}

renderRoster();
</script>
