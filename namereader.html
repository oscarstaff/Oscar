<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Name Reader · Oscars</title>
<style>
  :root{
    --bg:#f4f6fa; --card:#ffffff; --line:#e6e9f0; --line-soft:#f0f2f7;
    --ink:#1a1f2e; --dim:#69718a; --faint:#a3abc0;
    --accent:#4338ca; --accent-2:#6366f1; --accent-dim:#eef0fe;
    --ok:#16a34a; --warn:#d97706; --err:#dc2626;
    --sans:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    --mono:ui-monospace,'SF Mono',Menlo,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-family:var(--sans);line-height:1.5;-webkit-font-smoothing:antialiased;min-height:100vh;padding:26px 16px 60px;}
  .wrap{max-width:600px;margin:0 auto}

  .brand{display:flex;align-items:center;gap:9px;margin-bottom:22px}
  .brand-mark{width:26px;height:26px;border-radius:7px;background:var(--ink);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px}
  .brand-name{font-weight:700;font-size:14px}
  .brand-prod{font-weight:500;font-size:14px;color:var(--dim)}

  header{margin-bottom:20px}
  h1{font-size:23px;font-weight:700;letter-spacing:-.02em}
  .sub{color:var(--dim);font-size:14px;margin-top:5px;max-width:44ch}

  .drop{
    margin-top:18px;border:1.5px dashed var(--line);border-radius:16px;background:var(--card);
    padding:32px 20px;text-align:center;cursor:pointer;transition:border-color .15s,background .15s;
  }
  .drop:hover,.drop.drag{border-color:var(--accent-2);background:var(--accent-dim)}
  .drop-ic{width:36px;height:36px;margin:0 auto 12px;color:var(--accent-2)}
  .drop b{color:var(--ink);font-weight:600}
  .drop .muted{color:var(--dim);font-size:13px}
  .drop .accent{color:var(--accent);font-weight:600}

  .queue{margin-top:16px;display:flex;flex-direction:column;gap:8px}
  .row{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:12px;}
  .fname{font-family:var(--mono);font-size:11px;color:var(--faint);flex:0 0 auto;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .result{flex:1;min-width:0}
  .name{font-size:16px;font-weight:600;letter-spacing:-.01em}
  .status{font-size:12.5px;color:var(--dim);display:flex;align-items:center;gap:7px}
  .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
  .dot.pending{background:var(--faint)}
  .dot.working{background:var(--warn);animation:pulse 1s infinite}
  .dot.done{background:var(--ok)}
  .dot.error{background:var(--err)}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  .copy{background:none;border:1px solid var(--line);color:var(--dim);border-radius:8px;padding:6px 11px;font-family:var(--mono);font-size:10px;letter-spacing:.05em;text-transform:uppercase;cursor:pointer;flex-shrink:0;transition:all .12s;}
  .copy:hover{border-color:var(--accent-2);color:var(--accent)}
  .copy.copied{border-color:var(--ok);color:var(--ok)}
  .del{background:none;border:none;color:var(--faint);cursor:pointer;font-size:18px;line-height:1;padding:0 3px;flex-shrink:0}
  .del:hover{color:var(--err)}

  .bar{margin-top:18px;display:flex;gap:10px;align-items:center}
  .btn{font-family:var(--sans);font-size:14px;font-weight:600;border-radius:10px;padding:11px 18px;cursor:pointer;border:none;transition:opacity .12s,background .12s;}
  .btn-primary{background:var(--accent);color:#fff}
  .btn-primary:hover{background:var(--accent-2)}
  .btn-primary:disabled{opacity:.45;cursor:not-allowed}
  .btn-ghost{background:transparent;color:var(--dim);border:1px solid var(--line)}
  .btn-ghost:hover{color:var(--ink);border-color:var(--dim)}
  .spacer{flex:1}
  .copyall{font-family:var(--mono);font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:var(--accent);background:none;border:none;cursor:pointer;padding:8px}
  .copyall:disabled{color:var(--faint);cursor:not-allowed}
  .empty{color:var(--faint);font-size:13px;text-align:center;padding:22px;font-style:italic}
  footer{margin-top:34px;text-align:center;font-family:var(--mono);font-size:10px;color:var(--faint);letter-spacing:.04em}
</style>
</head>
<body>
<!-- NEXUS TOKEN GATE -->
<div id="__gate" style="position:fixed;inset:0;z-index:99999;background:linear-gradient(135deg,#f4f6fa,#eef0fe);display:flex;align-items:center;justify-content:center;font-family:system-ui,sans-serif;">
  <div style="background:#fff;border:1px solid #e6e9f0;border-radius:18px;padding:38px 34px;width:min(360px,90vw);text-align:center;box-shadow:0 20px 60px rgba(20,25,45,.12);">
    <div style="width:44px;height:44px;border-radius:11px;background:linear-gradient(135deg,#6366f1,#4338ca);margin:0 auto 14px;"></div>
    <div style="font-size:19px;font-weight:700;color:#1a1f2e;margin-bottom:8px;">Name Reader</div>
    <div id="__gateMsg" style="font-size:13.5px;color:#69718a;line-height:1.5;">Checking access…</div>
  </div>
</div>
<script>
(function(){
  var APP='namereader';
  var SECRET='oscars_nexus_gate_v1_8f3a2c91';
  var SB='https://jcfgldqrdbfkgbixszds.supabase.co';
  var KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpjZmdsZHFyZGJma2diaXhzemRzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1Nzc3NzEsImV4cCI6MjA5MDE1Mzc3MX0.Wj8cCpnlsoZOPj5sKWeEdfvgjG4Nc-UuTTYgbcrPfeI';
  function fail(m){var el=document.getElementById('__gateMsg');if(el){el.innerHTML=m+'<br><br><span style="color:#a3abc0;font-size:12px;">Open this app from the Nodes page in Nexus.</span>';}}
  function pass(){var g=document.getElementById('__gate');if(g)g.remove();}
  async function hmacHex(secret,msg){var enc=new TextEncoder();var k=await crypto.subtle.importKey('raw',enc.encode(secret),{name:'HMAC',hash:'SHA-256'},false,['verify','sign']);var s=await crypto.subtle.sign('HMAC',k,enc.encode(msg));return Array.from(new Uint8Array(s)).map(x=>x.toString(16).padStart(2,'0')).join('');}
  if(sessionStorage.getItem('ngate_'+APP)==='1'){pass();return;}
  (async function(){
    try{
      var hash=location.hash||'';
      var m=hash.match(/t=([^&]+)/);
      if(!m){fail('No access token.');return;}
      var token=decodeURIComponent(m[1]);
      var parts=token.split('.');
      if(parts.length!==2){fail('Invalid token.');return;}
      var b64=parts[0], sig=parts[1];
      var want=await hmacHex(SECRET,b64);
      if(want!==sig){fail('Token signature invalid.');return;}
      var payload=JSON.parse(decodeURIComponent(escape(atob(b64))));
      if(payload.app!==APP){fail('Token is for a different app.');return;}
      if(Date.now()>payload.exp){fail('Token expired — relaunch from Nexus.');return;}
      var name=payload.name||'';
      var r=await fetch(SB+'/rest/v1/app_access?app=eq.'+APP+'&staff_name=eq.'+encodeURIComponent(name)+'&select=staff_name',{headers:{apikey:KEY,Authorization:'Bearer '+KEY}});
      var rows=r.ok?await r.json():[];
      if(!rows.length){fail('You no longer have access to this app.');return;}
      sessionStorage.setItem('ngate_'+APP,'1');
      try{history.replaceState(null,'',location.pathname+location.search);}catch(e){}
      pass();
    }catch(e){ fail('Access check failed.'); console.warn('gate',e); }
  })();
})();
</script>
<!-- END GATE -->

<div class="wrap">
  <div class="brand">
    <div class="brand-mark">O</div>
    <span class="brand-name">Oscars</span><span class="brand-prod">Name Reader</span>
  </div>

  <header>
    <h1>Read names off documents</h1>
    <div class="sub">Drop in passports, CoEs, or letters. Each returns the student's name as Given Surname, ready to copy.</div>
  </header>

  <div class="drop" id="drop">
    <div class="drop-ic">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" width="36" height="36"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M17 8l-5-5-5 5"/><path d="M12 3v12"/></svg>
    </div>
    <div><b>Drop documents here</b> or <span class="accent">browse</span></div>
    <div class="muted">PDF or image · add several at once</div>
    <input type="file" id="file" accept="application/pdf,image/*" multiple hidden>
  </div>

  <div class="queue" id="queue"></div>

  <div class="bar" id="bar" style="display:none">
    <button class="btn btn-primary" id="run">Read names</button>
    <button class="btn btn-ghost" id="clear">Clear</button>
    <div class="spacer"></div>
    <button class="copyall" id="copyall" disabled>Copy all names</button>
  </div>

  <footer>Names are read on-document · nothing is stored</footer>
</div>

<script>
const dropEl=document.getElementById('drop');
const fileEl=document.getElementById('file');
const queueEl=document.getElementById('queue');
const barEl=document.getElementById('bar');
const runBtn=document.getElementById('run');
const clearBtn=document.getElementById('clear');
const copyAllBtn=document.getElementById('copyall');
let items=[];
function uid(){return Math.random().toString(36).slice(2,9);}
function fileToBase64(file){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(',')[1]);r.onerror=()=>rej(new Error('read failed'));r.readAsDataURL(file);});}
function escapeHtml(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function addFiles(fileList){
  [...fileList].forEach(f=>{
    const isPdf=f.type==='application/pdf', isImg=f.type.startsWith('image/');
    if(!isPdf&&!isImg)return;
    items.push({id:uid(),file:f,name:'',status:'pending',media:f.type});
  });
  render();
}
function render(){
  barEl.style.display=items.length?'flex':'none';
  if(!items.length){queueEl.innerHTML='<div class="empty">No documents yet.</div>';return;}
  queueEl.innerHTML=items.map(it=>{
    let inner;
    if(it.status==='done') inner='<div class="name">'+escapeHtml(it.name)+'</div>';
    else if(it.status==='error') inner='<div class="status"><span class="dot error"></span>'+escapeHtml(it.name||'No name found')+'</div>';
    else if(it.status==='working') inner='<div class="status"><span class="dot working"></span>Reading…</div>';
    else inner='<div class="status"><span class="dot pending"></span>Ready</div>';
    const copyBtn=it.status==='done'?'<button class="copy" data-id="'+it.id+'">Copy</button>':'';
    return '<div class="row"><span class="fname" title="'+escapeHtml(it.file.name)+'">'+escapeHtml(it.file.name)+'</span><div class="result">'+inner+'</div>'+copyBtn+'<button class="del" data-del="'+it.id+'">&times;</button></div>';
  }).join('');
  copyAllBtn.disabled=!items.some(i=>i.status==='done');
}
function cleanName(raw){
  let n=raw.replace(/^["'\s]+|["'\s]+$/g,'').replace(/\s+/g,' ');
  if(n===n.toUpperCase()) n=n.toLowerCase().replace(/\b\w/g,c=>c.toUpperCase());
  return n;
}
async function extractName(it){
  it.status='working';render();
  try{
    const b64=await fileToBase64(it.file);
    const source={type:'base64',media_type:it.media,data:b64};
    const block=it.media==='application/pdf'?{type:'document',source}:{type:'image',source};
    const prompt='This document belongs to a student. Extract ONLY the person\u2019s name as "Given Surname", cleanly formatted with normal capitalisation (not ALL CAPS). Include all given names if multiple. No titles, labels, numbers, or other text. If you cannot find a person\u2019s name, reply exactly: NO_NAME_FOUND. Reply with nothing but the name (or NO_NAME_FOUND).';
    const resp=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1000,messages:[{role:'user',content:[block,{type:'text',text:prompt}]}]})});
    if(!resp.ok) throw new Error('API '+resp.status);
    const data=await resp.json();
    const text=(data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('').trim();
    if(!text||/NO_NAME_FOUND/i.test(text)){it.status='error';it.name='No name found in this document';}
    else{it.name=cleanName(text);it.status='done';}
  }catch(e){it.status='error';it.name='Couldn\u2019t read this file';}
  render();
}
async function runAll(){
  runBtn.disabled=true;clearBtn.disabled=true;
  for(const it of items){ if(it.status!=='done') await extractName(it); }
  runBtn.disabled=false;clearBtn.disabled=false;
}
dropEl.addEventListener('click',()=>fileEl.click());
fileEl.addEventListener('change',e=>{addFiles(e.target.files);fileEl.value='';});
['dragenter','dragover'].forEach(ev=>dropEl.addEventListener(ev,e=>{e.preventDefault();dropEl.classList.add('drag');}));
['dragleave','drop'].forEach(ev=>dropEl.addEventListener(ev,e=>{e.preventDefault();dropEl.classList.remove('drag');}));
dropEl.addEventListener('drop',e=>{if(e.dataTransfer&&e.dataTransfer.files)addFiles(e.dataTransfer.files);});
runBtn.addEventListener('click',runAll);
clearBtn.addEventListener('click',()=>{items=[];render();});
queueEl.addEventListener('click',e=>{
  const cp=e.target.closest('.copy'); const dl=e.target.closest('.del');
  if(cp){const it=items.find(i=>i.id===cp.dataset.id);if(!it)return;navigator.clipboard.writeText(it.name).then(()=>{cp.textContent='Copied';cp.classList.add('copied');setTimeout(()=>{cp.textContent='Copy';cp.classList.remove('copied');},1200);});}
  if(dl){items=items.filter(i=>i.id!==dl.dataset.del);render();}
});
copyAllBtn.addEventListener('click',()=>{
  const names=items.filter(i=>i.status==='done').map(i=>i.name).join('\n');
  navigator.clipboard.writeText(names).then(()=>{copyAllBtn.textContent='Copied \u2713';setTimeout(()=>copyAllBtn.textContent='Copy all names',1200);});
});
render();
</script>
</body>
</html>
