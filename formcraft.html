    }

    function downloadBytes(bytes, filename, mimeType) {
      const blob = new Blob([bytes], { type: mimeType || 'application/pdf' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = filename; a.click();
      setTimeout(() => URL.revokeObjectURL(url), 3000);
    }

    const TYPE_ICONS = {
      text: 'fa-font', multiline: 'fa-align-left', number: 'fa-hashtag',
      email: 'fa-envelope', phone: 'fa-phone', date: 'fa-calendar',
      checkbox: 'fa-square-check', dropdown: 'fa-chevron-down', radio: 'fa-circle-dot',
      signature: 'fa-signature', usi: 'fa-id-card',
    };
    const TYPE_LABELS = {
      text: 'Text', multiline: 'Multiline', number: 'Number',
      email: 'Email', phone: 'Phone', date: 'Date',
      checkbox: 'Checkbox', dropdown: 'Dropdown', radio: 'Multiple choice',
      signature: 'Signature', usi: 'USI',
    };
    const htmlInputType = (t) => ({ number: 'number', email: 'email', phone: 'tel', date: 'date' })[t] || 'text';
    function validate(field, v) {
      if (field.required && (v == null || v === '' || v === false)) return 'Required';
      if (!v) return null;
      if (field.type === 'email' && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v)) return 'Invalid email';
      if (field.type === 'phone' && !/^[+()\-\s\d]{6,}$/.test(v)) return 'Invalid phone';
      if (field.type === 'usi') return validateUsi(v);
      if (field.type === 'number' && isNaN(Number(v))) return 'Not a number';
      if (field.type === 'date' && isNaN(Date.parse(v))) return 'Invalid date';
      return null;
    }
    const hasValue = (f, v) => f.type === 'checkbox' ? !!v : (v != null && v !== '');

    // Today's date as ISO (YYYY-MM-DD), local time — for auto-dated fields.
    function todayISO() {
      const d = new Date();
      const p = (n) => String(n).padStart(2, '0');
      return d.getFullYear() + '-' + p(d.getMonth() + 1) + '-' + p(d.getDate());
    }
    // A field gets today's date if it's a date field OR a text field clearly
    // labelled as a date — but NEVER a birth date or an arrival date.
    // (Many forms leave "Date" fields as plain text, so type alone isn't enough.)
    function isAutoDateField(f) {
      const lab = (f.label || '').toLowerCase() + ' ' + (f.name || '').toLowerCase();
      const looksDate = f.type === 'date' || /\bdate\b|date signed|dated/.test(lab);
      if (!looksDate) return false;
      if (/dob|d\.o\.b|date of birth|birth|born/.test(lab)) return false;
      if (/arriv|entry to australia|first arrival|landed/.test(lab)) return false;
      // don't touch dropdowns/checkboxes/signatures that happen to say "date"
      if (f.type === 'checkbox' || f.type === 'signature' || f.type === 'dropdown' || f.type === 'radio') return false;
      return true;
    }
    // Return the seed values to pre-fill on load: today's date in every
    // auto-date field, and the applicant's name mirrored into a later name field.
    function seedAutoValues(fieldList) {
      const seed = {};
      const today = todayISO();
      for (const f of fieldList) {
        if (isAutoDateField(f)) seed[f.name] = today;
      }
      applyNameMirror(fieldList, seed);
      return seed;
    }
    // Fill a bottom "Name" field (signature/declaration name) with the
    // applicant's full name. Handles two layouts:
    //   (a) one top "Full Name" field  → copy it.
    //   (b) split "Given Names" + "Surname" fields → combine as "Given Surname".
    // Skips emergency-contact / next-of-kin / referrer names entirely, and
    // never overwrites a bottom name the user/AI already filled.
    function applyNameMirror(fieldList, vals) {
      const isKin = (lab) => /emergency|next of kin|kin|guardian|referr|contact person|witness/.test(lab);
      const nameish = fieldList.filter(f => {
        if (f.type !== 'text') return false;
        const lab = (f.label || '').toLowerCase();
        return /name/.test(lab) && !isKin(lab);
      });
      if (!nameish.length) return vals;

      // find given + surname among the applicant name fields
      const given = nameish.find(f => /given|first|christian/.test((f.label || '').toLowerCase()));
      const surname = nameish.find(f => /surname|last|family/.test((f.label || '').toLowerCase()));
      const plainFull = nameish.find(f => /full name|full/.test((f.label || '').toLowerCase()));

      // build the applicant's full name string
      let fullName = '';
      if (given || surname) {
        const g = given ? String(vals[given.name] || '').trim() : '';
        const s = surname ? String(vals[surname.name] || '').trim() : '';
        fullName = [g, s].filter(Boolean).join(' ');
      } else if (plainFull) {
        fullName = String(vals[plainFull.name] || '').trim();
      } else {
        fullName = String(vals[nameish[0].name] || '').trim();
      }
      if (!fullName) return vals;

      // the target is a name field that ISN'T the given/surname/full source —
      // i.e. a standalone "Name" (declaration/signature) field, preferring the last one.
      const sources = new Set([given, surname, plainFull].filter(Boolean).map(f => f.name));
      const targets = nameish.filter(f => !sources.has(f.name));
      const target = targets.length ? targets[targets.length - 1] : null;
      if (target && (vals[target.name] == null || vals[target.name] === '')) {
        vals[target.name] = fullName;
      }
      return vals;
    }

    function PdfPreview({ pdfJsDoc, fields, values, currentPage, onPageChange, pageCount, scale, onZoom, highlightedFieldName, onFieldClick, onValueChange }) {
      const canvasRef = useRef(null);
      const [renderedSize, setRenderedSize] = useState({ width: 0, height: 0 });
      const [editing, setEditing] = useState(null);
      const INLINE_TYPES = ['text', 'number', 'email', 'phone', 'date', 'multiline'];

      useEffect(() => {
        if (!pdfJsDoc || !canvasRef.current) return;
        let cancelled = false;
        (async () => {
          try {
            const page = await pdfJsDoc.getPage(currentPage);
            const vp = page.getViewport({ scale });
            const c = canvasRef.current;
            const dpr = window.devicePixelRatio || 1;
            c.width = vp.width * dpr;
            c.height = vp.height * dpr;
            c.style.width = vp.width + 'px';
            c.style.height = vp.height + 'px';
            const ctx = c.getContext('2d');
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            await page.render({ canvasContext: ctx, viewport: vp }).promise;
            if (!cancelled) setRenderedSize({ width: vp.width, height: vp.height });
          } catch (e) {
            if (!cancelled) console.warn('render', e);
          }
        })();
        return () => { cancelled = true; };
      }, [pdfJsDoc, currentPage, scale]);

      useEffect(() => {
        if (!highlightedFieldName) return;
        const field = fields.find(f => f.name === highlightedFieldName);
        if (!field) return;
        const w = (field.widgets || []).find(w => w.page === currentPage);
        if (!w) return;
        setTimeout(() => {
          const box = document.querySelector('.pdf-field-box.highlight');
          if (box) box.scrollIntoView({ behavior: 'smooth', block: 'center', inline: 'center' });
        }, 60);
      }, [highlightedFieldName, currentPage, fields]);

      const overlays = useMemo(() => {
        const out = [];
        for (const f of fields) {
          for (const w of (f.widgets || [])) {
            if (w.page !== currentPage) continue;
            out.push({
              fieldName: f.name,
              field: f,
              x: w.x * scale,
              y: w.y * scale,
              w: w.w * scale,
              h: w.h * scale,
            });
          }
        }
        return out;
      }, [fields, currentPage, scale]);

      return (
        <div className="pdf-pane">
          <div className="pdf-toolbar">
            <div className="page-nav">
              <button onClick={() => onPageChange(currentPage - 1)} disabled={currentPage <= 1}>
                <i className="fa-solid fa-chevron-left" />
              </button>
              <span>{currentPage} / {pageCount}</span>
              <button onClick={() => onPageChange(currentPage + 1)} disabled={currentPage >= pageCount}>
                <i className="fa-solid fa-chevron-right" />
              </button>
            </div>
            <div className="page-nav" style={{ marginLeft: 8 }}>
              <button onClick={() => onZoom && onZoom(-0.15)} disabled={scale <= 0.5} title="Zoom out"><i className="fa-solid fa-minus" /></button>
              <span>{Math.round(scale * 100)}%</span>
              <button onClick={() => onZoom && onZoom(0.15)} disabled={scale >= 2.5} title="Zoom in"><i className="fa-solid fa-plus" /></button>
            </div>
          </div>
          <div className="pdf-page-wrap" style={{ width: renderedSize.width || undefined, height: renderedSize.height || undefined }}>
            <canvas ref={canvasRef} />
            <div className="pdf-overlay">
              {overlays.map((o, i) => {
                const v = values[o.fieldName];
                const filled = hasValue(o.field, v);
                const highlight = o.fieldName === highlightedFieldName;
                const t = o.field.type;
                const canInline = INLINE_TYPES.includes(t) && !o.field.isGroup;
                const isEditing = editing === o.fieldName;

                if (isEditing && canInline) {
                  const commit = (val) => { onValueChange(o.fieldName, val); };
                  const common = {
                    autoFocus: true,
                    className: 'pdf-inline-input',
                    style: { left: o.x, top: o.y, width: Math.max(o.w, 60), height: o.h, minHeight: t === 'multiline' ? Math.max(o.h, 40) : o.h },
                    value: v || '',
                    onChange: (e) => commit(e.target.value),
                    onBlur: () => { setTimeout(() => setEditing(cur => cur === o.fieldName ? null : cur), 120); },
                    onKeyDown: (e) => { if (e.key === 'Enter' && t !== 'multiline') { e.preventDefault(); setEditing(null); } if (e.key === 'Escape') setEditing(null); },
                  };
                  return (
                    <React.Fragment key={i}>
                      {t === 'multiline'
                        ? <textarea {...common} />
                        : <input type={t === 'date' ? 'date' : t === 'number' ? 'number' : t === 'email' ? 'email' : t === 'phone' ? 'tel' : 'text'} {...common} />}
                    </React.Fragment>
                  );
                }

                const onBoxClick = (e) => {
                  e.stopPropagation();
                  onFieldClick(o.fieldName);
                  if (t === 'checkbox') { onValueChange(o.fieldName, !v); return; }
                  if (canInline) { setEditing(o.fieldName); return; }
                };

                return (
                  <React.Fragment key={i}>
                    <div
                      className={'pdf-field-box' + (filled ? ' has-value' : '') + (highlight ? ' highlight' : '') + (o.field.isGroup ? ' group' : '') + (canInline ? ' editable' : '')}
                      style={{ left: o.x, top: o.y, width: o.w, height: o.h }}
                      onClick={onBoxClick}
                      title={canInline ? 'Click to type' : (t === 'checkbox' ? 'Click to tick' : o.field.label)}
                    >
                      {t === 'checkbox'
                        ? (filled ? <i className="fa-solid fa-check" style={{ fontSize: Math.min(o.h * 0.8, 12), color: 'var(--ok)' }} /> : '')
                        : (!filled && (o.field.label || '').slice(0, 20))}
                    </div>
                    {filled && t !== 'checkbox' && t !== 'signature' && (
                      <div className="pdf-value-overlay" style={{ left: o.x, top: o.y, width: o.w, height: o.h }} onClick={(e) => { e.stopPropagation(); onFieldClick(o.fieldName); if (canInline) setEditing(o.fieldName); }}>
                        {String(v).slice(0, 60)}
                      </div>
                    )}
                    {filled && t === 'signature' && (
                      <div className="pdf-sig-mark" style={{ left: o.x, top: o.y, width: o.w, height: o.h }} onClick={(e) => { e.stopPropagation(); onFieldClick(o.fieldName); }}>
                        <i className="fa-solid fa-signature" /> Signed
                      </div>
                    )}
                  </React.Fragment>
                );
              })}
            </div>
          </div>
        </div>
      );
    }

    function SignaturePad({ value, onChange }) {
      const canvasRef = React.useRef(null);
      const drawing = React.useRef(false);
      const last = React.useRef(null);
      const [hasInk, setHasInk] = React.useState(!!value);

      const setupCanvas = React.useCallback(() => {
        const c = canvasRef.current; if (!c) return null;
        const rect = c.getBoundingClientRect();
        if (!rect.width) return null;
        const dpr = window.devicePixelRatio || 1;
        if (c.width !== Math.round(rect.width * dpr)) {
          c.width = rect.width * dpr; c.height = rect.height * dpr;
        }
        const ctx = c.getContext('2d');
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        ctx.lineWidth = 2.2; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
        ctx.strokeStyle = '#111';
        return ctx;
      }, []);

      const lastSynced = React.useRef(value);
      React.useEffect(() => {
        if (value === lastSynced.current) return;
        lastSynced.current = value;
        const id = setTimeout(() => {
          const ctx = setupCanvas();
          if (!ctx) return;
          const c = canvasRef.current;
          const rect = c.getBoundingClientRect();
          ctx.clearRect(0, 0, c.width, c.height);
          if (value) {
            const img = new Image();
            img.onload = () => ctx.drawImage(img, 0, 0, rect.width, rect.height);
            img.src = value;
          }
          setHasInk(!!value);
        }, 50);
        return () => clearTimeout(id);
      }, [value]);

      React.useEffect(() => {
        const id = setTimeout(() => {
          const ctx = setupCanvas();
          if (ctx && value) {
            const c = canvasRef.current;
            const rect = c.getBoundingClientRect();
            const img = new Image();
            img.onload = () => ctx.drawImage(img, 0, 0, rect.width, rect.height);
            img.src = value;
          }
        }, 50);
        return () => clearTimeout(id);
      }, []);

      const pos = (e) => {
        const c = canvasRef.current; const r = c.getBoundingClientRect();
        const t = e.touches ? e.touches[0] : e;
        return { x: t.clientX - r.left, y: t.clientY - r.top };
      };
      const start = (e) => {
        e.preventDefault();
        setupCanvas();
        drawing.current = true; last.current = pos(e);
      };
      const move = (e) => {
        if (!drawing.current) return; e.preventDefault();
        const c = canvasRef.current; const ctx = c.getContext('2d');
        const p = pos(e);
        ctx.beginPath(); ctx.moveTo(last.current.x, last.current.y); ctx.lineTo(p.x, p.y); ctx.stroke();
        last.current = p; if (!hasInk) setHasInk(true);
      };
      const end = () => {
        if (!drawing.current) return; drawing.current = false;
        const c = canvasRef.current;
        if (c) onChange(c.toDataURL('image/png'));
      };
      const clear = () => {
        const c = canvasRef.current; if (!c) return;
        const ctx = c.getContext('2d');
        ctx.clearRect(0, 0, c.width, c.height); setHasInk(false); onChange('');
      };

      return (
        <div className="sig-pad-wrap">
          <canvas ref={canvasRef} className="sig-pad"
            onMouseDown={start} onMouseMove={move} onMouseUp={end} onMouseLeave={end}
            onTouchStart={start} onTouchMove={move} onTouchEnd={end} />
          <div className="sig-pad-bar">
            <span className="sig-hint">{hasInk ? '✓ Signed' : 'Sign above with mouse or finger'}</span>
            <button type="button" className="sig-clear" onClick={clear}>Clear</button>
          </div>
        </div>
      );
    }

    function FieldInput({ field, value, onChange, err }) {
      const cls = 'form-input' + (hasValue(field, value) ? ' has-value' : '') + (err ? ' invalid' : '');
      if (field.type === 'signature') return <SignaturePad value={value} onChange={onChange} />;
      if (field.type === 'checkbox') return (
        <label className="form-check">
          <input type="checkbox" checked={!!value} onChange={(e) => onChange(e.target.checked)} />
          <span>Tick if yes</span>
        </label>
      );
      if (field.type === 'dropdown') return (
        <select className={cls} value={value || ''} onChange={(e) => onChange(e.target.value)}>
          <option value="">— select —</option>
          {(field.options || []).map(opt => <option key={opt} value={opt}>{opt}</option>)}
        </select>
      );
      if (field.type === 'radio') return (
        <div className="form-radio-group">
          {(field.options || []).map(opt => (
            <label key={opt} className={'form-radio' + (value === opt ? ' checked' : '')}>
              <input type="radio" name={field.name} value={opt} checked={value === opt} onChange={() => onChange(opt)} />
              <span>{opt}</span>
            </label>
          ))}
        </div>
      );
      if (field.type === 'multiline') return (
        <textarea className={cls} rows={3} value={value || ''} onChange={(e) => onChange(e.target.value)} placeholder="Type your answer…" />
      );
      if (field.type === 'usi') return (
        <input
          type="text"
          className={cls}
          value={value || ''}
          onChange={(e) => onChange(e.target.value.toUpperCase().replace(/[^A-Z0-9]/g, '').slice(0, 10))}
          maxLength={10}
          placeholder="10-char USI (e.g. 3AW88YH9U5)"
          autoCapitalize="characters"
          autoCorrect="off"
          spellCheck={false}
          style={{ fontFamily: 'var(--font-mono)', letterSpacing: '0.06em' }}
        />
      );
      return (
        <input type={htmlInputType(field.type)} className={cls} value={value || ''} onChange={(e) => onChange(e.target.value)} placeholder="Type your answer…" />
      );
    }

    function FormRow({ field, value, onChange, mode, onUpdate, onDelete, highlighted, onClick }) {
      const err = mode === 'fill' ? validate(field, value) : null;
      const cls = 'form-group' + (highlighted ? ' highlight' : '') + (err ? ' invalid' : '');
      const updateOption = (idx, val) => {
        const opts = [...(field.options || [])]; opts[idx] = val; onUpdate({ options: opts });
      };
      const removeOption = (idx) => {
        const opts = [...(field.options || [])]; opts.splice(idx, 1); onUpdate({ options: opts });
      };
      const addOption = () => {
        onUpdate({ options: [...(field.options || []), 'Option ' + ((field.options || []).length + 1)] });
      };
      return (
        <div className={cls} onClick={onClick} onFocusCapture={onClick}>
          <div className="form-label">
            <i className={'fa-solid ' + (TYPE_ICONS[field.type] || 'fa-font') + ' field-icon'} />
            <span>{field.label || field.name}</span>
            {field.required && <span className="req">*</span>}
            {field.widgets && field.widgets[0] && (<span className="form-label-page">p{field.widgets[0].page}</span>)}
          </div>
          {mode === 'fill' ? (
            <React.Fragment>
              <FieldInput field={field} value={value} onChange={onChange} err={err} />
              {err && <div className="field-error"><i className="fa-solid fa-circle-exclamation" /> {err}</div>}
            </React.Fragment>
          ) : (
            <div onClick={(e) => e.stopPropagation()}>
              <div className="edit-row">
                <label>Label</label>
                <input className="form-input" value={field.label} onChange={(e) => onUpdate({ label: e.target.value })} />
              </div>
              <div className="edit-row">
                <label>Type</label>
                <select className="form-input" value={field.type} onChange={(e) => onUpdate({ type: e.target.value })} disabled={field.isGroup}>
                  {Object.entries(TYPE_LABELS).map(([k, v]) => <option key={k} value={k}>{v}</option>)}
                </select>
              </div>
              {(field.type === 'dropdown' || field.type === 'radio') && (
                <div className="edit-row">
                  <label>Options</label>
                  <div className="edit-options-list">
                    {(field.options || []).map((opt, idx) => (
                      <div key={idx} className="edit-option-row">
                        <input value={opt} onChange={(e) => updateOption(idx, e.target.value)} />
                        {!field.isGroup && <button onClick={() => removeOption(idx)}>×</button>}
                      </div>
                    ))}
                    {!field.isGroup && <button className="edit-add-option" onClick={addOption}><i className="fa-solid fa-plus" /> Add option</button>}
                  </div>
                </div>
              )}
              <div className="edit-row">
                <label>Required</label>
                <label className="check-inline">
                  <input type="checkbox" checked={!!field.required} onChange={(e) => onUpdate({ required: e.target.checked })} />
                  <span>Must be filled before export</span>
                </label>
              </div>
              {field.isGroup && (
                <div className="edit-row">
                  <label></label>
                  <button className="danger-btn" onClick={() => onDelete()}><i className="fa-solid fa-link-slash" /> Ungroup</button>
                </div>
              )}
            </div>
          )}
        </div>
      );
    }

    function GroupSuggestion({ suggestion, fields, onAccept, onDismiss }) {
      const a = fields.find(f => f.name === suggestion.ids[0]);
      const b = fields.find(f => f.name === suggestion.ids[1]);
      const [label, setLabel] = useState('');
      const [optA, setOptA] = useState('');
      const [optB, setOptB] = useState('');
      if (!a || !b) return null;
      return (
        <div className="group-hint">
          <i className="fa-solid fa-lightbulb" />
          <div style={{ flex: 1 }}>
            <strong>Possible pair: {a.label} + {b.label}</strong> (both checkboxes on page {a.widgets[0].page}).
            <div style={{ marginTop: 8, display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 6 }}>
              <input className="form-input" style={{ fontSize: 12, padding: '6px 9px' }} placeholder="Question (e.g. Gender)" value={label} onChange={(e) => setLabel(e.target.value)} />
              <span></span>
              <input className="form-input" style={{ fontSize: 12, padding: '6px 9px' }} placeholder={'Option for "' + a.label + '"'} value={optA} onChange={(e) => setOptA(e.target.value)} />
              <input className="form-input" style={{ fontSize: 12, padding: '6px 9px' }} placeholder={'Option for "' + b.label + '"'} value={optB} onChange={(e) => setOptB(e.target.value)} />
            </div>
            <div className="hint-actions">
              <button className="btn btn-primary" onClick={() => onAccept(label || (a.label + ' / ' + b.label), optA || a.label, optB || b.label)}>
                <i className="fa-solid fa-check" /> Group them
              </button>
              <button className="btn" onClick={onDismiss}>Not related</button>
            </div>
          </div>
        </div>
      );
    }

    // ── Shared library (Supabase) — forms live here as rows with embedded PDFs ──
    const SB_URL = window.NEXUS_SB || '';
    const SB_KEY = window.NEXUS_KEY || '';
    const SB_USER = window.NEXUS_USER || '';
    const sbHeaders = { apikey: SB_KEY, Authorization: 'Bearer ' + SB_KEY, 'Content-Type': 'application/json' };

    // Send the form's fields + the pasted text or uploaded file to the
    // parse-enrolment Edge Function (Gemini). Returns { values, unmatched }.
    async function parseEnrolment({ fields, text, fileBase64, docMime }) {
      const catalogue = fields
        .filter(f => !f.isGroup === false || !f.isGroup) // keep all incl. groups
        .map(f => ({ name: f.name, label: f.label || f.name, type: f.type, options: f.options || undefined }));
      const body = { fields: catalogue };
      if (text) body.text = text;
      if (fileBase64) { body.file_base64 = fileBase64; body.doc_mime = docMime || ''; }
      const r = await fetch(SB_URL + '/functions/v1/parse-enrolment', {
        method: 'POST', headers: sbHeaders, body: JSON.stringify(body),
      });
      const data = await r.json();
      if (!r.ok || data.error) throw new Error(data.error || ('HTTP ' + r.status));
      return data;
    }

    async function fetchTemplates(fingerprint) {
      try {
        let url = SB_URL + '/rest/v1/formcraft_templates?select=*&order=created_at.desc';
        const r = await fetch(url, { headers: sbHeaders });
        if (!r.ok) return [];
        const rows = await r.json();
        return rows.sort((a, b) => {
          const am = a.pdf_fingerprint === fingerprint ? 0 : 1;
          const bm = b.pdf_fingerprint === fingerprint ? 0 : 1;
          return am - bm;
        });
      } catch (e) { console.warn('fetchTemplates', e); return []; }
    }
    async function saveTemplateToCloud(name, fingerprint, data) {
      const r = await fetch(SB_URL + '/rest/v1/formcraft_templates', {
        method: 'POST', headers: { ...sbHeaders, Prefer: 'return=representation' },
        body: JSON.stringify({ name, pdf_fingerprint: fingerprint, data, created_by: SB_USER }),
      });
      if (!r.ok) throw new Error('save failed (' + r.status + ')');
      return (await r.json())[0];
    }
    async function updateTemplateInCloud(id, name, fingerprint, data) {
      const r = await fetch(SB_URL + '/rest/v1/formcraft_templates?id=eq.' + id, {
        method: 'PATCH', headers: { ...sbHeaders, Prefer: 'return=representation' },
        body: JSON.stringify({ name, pdf_fingerprint: fingerprint, data }),
      });
      if (!r.ok) throw new Error('update failed (' + r.status + ')');
      return (await r.json())[0];
    }
    async function deleteTemplateFromCloud(id) {
      const r = await fetch(SB_URL + '/rest/v1/formcraft_templates?id=eq.' + id, { method: 'DELETE', headers: sbHeaders });
      if (!r.ok) throw new Error('delete failed');
    }
    // Fill-log — one tiny row per export. No PDF stored, so it barely touches storage.
    async function logFill(row) {
      try {
        const r = await fetch(SB_URL + '/rest/v1/formcraft_fills', {
          method: 'POST', headers: sbHeaders,
          body: JSON.stringify(row),
        });
        if (!r.ok) console.warn('logFill', r.status);
      } catch (e) { console.warn('logFill', e); }
    }

    function App() {
      const [pdfBytes, setPdfBytes] = useState(null);
      const [pdfJsDoc, setPdfJsDoc] = useState(null);
      const [originalFields, setOriginalFields] = useState([]);
      const [fields, setFields] = useState([]);
      const [groups, setGroups] = useState([]);
      const [pendingSuggestions, setPendingSuggestions] = useState([]);
      const [fileName, setFileName] = useState('');
      const [pageCount, setPageCount] = useState(1);
      const [currentPage, setCurrentPage] = useState(1);
      const [scale, setScale] = useState(1.2);
      const [values, setValues] = useState({});
      const [mode, setMode] = useState('fill');
      const [busy, setBusy] = useState(false);
      const [toast, setToast] = useState(null);
      const [highlight, setHighlight] = useState(null);

      useEffect(() => {
        if (!highlight) return;
        const t = setTimeout(() => {
          const row = document.querySelector('[data-row="' + (window.CSS && CSS.escape ? CSS.escape(highlight) : highlight) + '"]');
          if (row && row.scrollIntoView) row.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }, 60);
        return () => clearTimeout(t);
      }, [highlight]);

      const [library, setLibrary] = useState([]);
      const [showLibrary, setShowLibrary] = useState(false);
      const [libLoading, setLibLoading] = useState(false);
      const [showAutofill, setShowAutofill] = useState(false);
      const [autofillText, setAutofillText] = useState('');
      const [autofillBusy, setAutofillBusy] = useState(false);
      const [loadedTplId, setLoadedTplId] = useState(null);
      const [loadedTplName, setLoadedTplName] = useState(null);
      const [formWidth, setFormWidth] = useState(() => {
        const stored = parseInt(localStorage.getItem('fc_formWidth') || '', 10);
        return Number.isFinite(stored) && stored > 320 && stored < 1600 ? stored : 500;
      });
      const [dragging, setDragging] = useState(false);

      useEffect(() => {
        if (!dragging) return;
        const onMove = (e) => {
          const winW = window.innerWidth;
          const newW = Math.max(360, Math.min(winW - 360, winW - e.clientX));
          setFormWidth(newW);
        };
        const onUp = () => {
          setDragging(false);
          localStorage.setItem('fc_formWidth', String(formWidth));
        };
        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup', onUp);
        document.body.style.cursor = 'col-resize';
        document.body.style.userSelect = 'none';
        return () => {
          document.removeEventListener('mousemove', onMove);
          document.removeEventListener('mouseup', onUp);
          document.body.style.cursor = '';
          document.body.style.userSelect = '';
        };
      }, [dragging, formWidth]);

      const showToast = (msg, type) => {
        type = type || 'ok';
        setToast({ msg, type });
        setTimeout(() => setToast(t => t && t.msg === msg ? null : t), 3500);
      };

      const filledCount = useMemo(() => fields.filter(f => hasValue(f, values[f.name])).length, [fields, values]);
      const errors = useMemo(() => fields.map(f => ({ f, e: validate(f, values[f.name]) })).filter(x => x.e), [fields, values]);

      const loadLibrary = useCallback(async (fp) => {
        const rows = await fetchTemplates(fp);
        setLibrary(rows);
        return rows;
      }, []);

      // Parse a PDF File + apply its saved template (matched by fingerprint).
      const openPdfWithTemplate = useCallback(async (file, forcedTemplate, forcedTplRow) => {
        setBusy(true);
        try {
          const { bytes, fields: fresh, pageCount } = await readPdf(file);
          const pdfjs = await pdfjsLib.getDocument({ data: bytes.slice() }).promise;
          setPdfJsDoc(pdfjs);
          setPdfBytes(bytes);
          setOriginalFields(fresh);
          setFileName(file.name);
          setPageCount(pageCount);
          setCurrentPage(1);
          setMode('fill');

          const fp = pdfFingerprint(bytes);
          const rows = await loadLibrary(fp);

          // Priority: the row we were explicitly opened from → any team row matching this PDF.
          const teamTpl = forcedTplRow || (rows || []).find(r => r.pdf_fingerprint === fp);
          const tplData = forcedTemplate || (teamTpl && teamTpl.data);

          if (tplData) {
            const { fields: applied, groups } = applyTemplate(fresh, tplData);
            setFields(applied);
            setGroups(groups);
            setValues(seedAutoValues(applied));   // today-dates + name mirror
            setPendingSuggestions([]);
            if (teamTpl) { setLoadedTplId(teamTpl.id); setLoadedTplName(teamTpl.name); }
            try { localStorage.setItem(fp, JSON.stringify(tplData)); } catch {}
            showToast('Loaded ' + applied.length + ' fields' + (teamTpl ? ' · "' + teamTpl.name + '"' : ''), 'ok');
          } else {
            setFields(fresh);
            setGroups([]);
            setValues(seedAutoValues(fresh));      // today-dates + name mirror
            setLoadedTplId(null);
            setLoadedTplName(null);
            const sugg = suggestGroups(fresh);
            setPendingSuggestions(sugg);
            if (fresh.length === 0) showToast('No fillable fields found in this PDF', 'err');
            else {
              showToast('Loaded ' + fresh.length + ' fields' + (sugg.length ? ' · ' + sugg.length + ' group suggestion' + (sugg.length === 1 ? '' : 's') : ''), 'ok');
              if (sugg.length) setMode('edit');
            }
          }
        } catch (e) {
          console.error(e);
          showToast('Could not read PDF: ' + e.message, 'err');
        }
        setBusy(false);
      }, [loadLibrary]);

      // Open a DB form: decode its embedded PDF, apply its own field setup.
      const openDbForm = useCallback(async (tplRow) => {
        const b64 = tplRow.data && tplRow.data.pdfBase64;
        if (!b64) { showToast('This form has no embedded PDF.', 'err'); return; }
        setBusy(true);
        try {
          const bin = atob(b64);
          const bytes = new Uint8Array(bin.length);
          for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
          const file = new File([bytes], tplRow.data.pdfName || (tplRow.name + '.pdf'), { type: 'application/pdf' });
          await openPdfWithTemplate(file, tplRow.data, tplRow);
        } catch (e) {
          console.error(e);
          showToast('Could not open form: ' + e.message, 'err');
          setBusy(false);
        }
      }, [openPdfWithTemplate]);

      const updateField = useCallback((name, patch) => {
        if (name === '__course' && patch.__draw) {
          try { localStorage.setItem('fc_course_draw', JSON.stringify(patch.__draw)); } catch {}
        }
        setFields(prev => prev.map(f => f.name === name ? { ...f, ...patch } : f));
      }, []);

      const onChangeValue = useCallback((name, value) => {
        setValues(prev => ({ ...prev, [name]: value }));
      }, []);

      const acceptSuggestion = useCallback((sugg, label, optA, optB) => {
        const memberA = fields.find(f => f.name === sugg.ids[0]);
        const memberB = fields.find(f => f.name === sugg.ids[1]);
        if (!memberA || !memberB) return;
        const newGroup = {
          id: sugg.id,
          label: label,
          required: false,
          members: [
            { name: memberA.name, option: optA },
            { name: memberB.name, option: optB },
          ],
        };
        const groupField = {
          name: newGroup.id,
          type: 'radio',
          label: newGroup.label,
          required: false,
          options: newGroup.members.map(m => m.option),
          isGroup: true,
          memberMap: Object.fromEntries(newGroup.members.map(m => [m.option, m.name])),
          widgets: [...(memberA.widgets || []), ...(memberB.widgets || [])],
          order: Math.min(memberA.order, memberB.order),
        };
        setGroups(prev => [...prev, newGroup]);
        setFields(prev =>
          [...prev.filter(f => f.name !== memberA.name && f.name !== memberB.name), groupField]
            .sort((a, b) => a.order - b.order)
        );
        setPendingSuggestions(prev => prev.filter(s => s.id !== sugg.id));
        showToast('Grouped — adjust label/options in Edit mode if needed', 'ok');
      }, [fields]);

      const dismissSuggestion = useCallback((sugg) => {
        setPendingSuggestions(prev => prev.filter(s => s.id !== sugg.id));
      }, []);

      const ungroup = useCallback((groupName) => {
        const group = groups.find(g => g.id === groupName);
        if (!group) return;
        const restored = group.members.map(m => originalFields.find(o => o.name === m.name)).filter(Boolean);
        setGroups(prev => prev.filter(g => g.id !== groupName));
        setFields(prev =>
          [...prev.filter(f => f.name !== groupName), ...restored].sort((a, b) => a.order - b.order)
        );
      }, [groups, originalFields]);

      const saveTemplate = useCallback(async () => {
        const tpl = buildTemplate(fields, originalFields, groups);
        const fp = pdfBytes ? pdfFingerprint(pdfBytes) : null;
        if (pdfBytes) {
          let bin = '';
          const arr = new Uint8Array(pdfBytes);
          for (let i = 0; i < arr.length; i++) bin += String.fromCharCode(arr[i]);
          tpl.pdfBase64 = btoa(bin);
          tpl.pdfName = fileName || 'form.pdf';
        }
        if (loadedTplId) {
          const upd = confirm('Update the existing form "' + (loadedTplName || 'form') + '"?\n\nOK = overwrite it.\nCancel = save as a NEW form.');
          if (upd) {
            if (fp) { try { localStorage.setItem(fp, JSON.stringify(tpl)); } catch {} }
            try {
              await updateTemplateInCloud(loadedTplId, loadedTplName, fp, tpl);
              showToast('Form "' + loadedTplName + '" updated', 'ok');
              loadLibrary(fp);
            } catch (e) {
              console.error(e);
              showToast('Update failed: ' + e.message, 'err');
            }
            return;
          }
        }
        const defName = (loadedTplName || (fileName.replace(/\.pdf$/i, '') || 'Form'));
        const name = prompt('Name this form (visible to all staff):', defName);
        if (!name) return;
        if (fp) { try { localStorage.setItem(fp, JSON.stringify(tpl)); } catch {} }
        try {
          const made = await saveTemplateToCloud(name.trim(), fp, tpl);
          if (made && made.id) { setLoadedTplId(made.id); setLoadedTplName(made.name); }
          showToast('Form saved to team library', 'ok');
          loadLibrary(fp);
        } catch (e) {
          console.error(e);
          showToast('Cloud save failed: ' + e.message, 'err');
        }
      }, [fields, originalFields, groups, fileName, pdfBytes, loadedTplId, loadedTplName, loadLibrary]);

      const applyCloudTemplate = useCallback((tplRow) => {
        setShowLibrary(false);
        openDbForm(tplRow);
      }, [openDbForm]);

      const openLibrary = useCallback(() => {
        setShowLibrary(true);
        setLibLoading(true);
        loadLibrary(pdfBytes ? pdfFingerprint(pdfBytes) : null).finally(() => setLibLoading(false));
      }, [loadLibrary, pdfBytes]);

      const removeTemplate = useCallback(async (tplRow) => {
        if (!confirm('Delete "' + tplRow.name + '" from the team library? This affects all staff.')) return;
        try {
          await deleteTemplateFromCloud(tplRow.id);
          setLibrary(lib => lib.filter(t => t.id !== tplRow.id));
          showToast('Form deleted', 'ok');
        } catch (e) { showToast('Delete failed', 'err'); }
      }, []);

      // Pull student first/last/DOB from filled values by label matching.
      const extractStudent = useCallback(() => {
        const findVal = (res) => {
          for (const f of fields) {
            if (f.isGroup) continue;
            const lab = (f.label || '').toLowerCase();
            if (res.test(lab) && values[f.name]) return String(values[f.name]).trim();
          }
          return '';
        };
        return {
          first: findVal(/given|first/),
          last: findVal(/surname|last|family/),
          dob: findVal(/dob|date of birth|birth/),
        };
      }, [fields, values]);

      // Build the application-draft reference:
      //   GIVEN NAME SURNAME - CERTIFICATE NAME - APPLICATION NO
      // Cert name comes from the Course field (or any course/qualification/cert
      // field). "APPLICATION NO" stays as a literal placeholder to fill in later.
      const buildDraftName = useCallback(() => {
        const { first, last } = extractStudent();
        const name = [first, last].filter(Boolean).join(' ').trim().toUpperCase();
        let cert = '';
        for (const f of fields) {
          if (f.isGroup) continue;
          const lab = (f.label || '').toLowerCase();
          if ((f.__courseField || /course|certificate|qualification|cert\b/.test(lab)) && values[f.name]) {
            cert = String(values[f.name]).trim();
            break;
          }
        }
        cert = cert.toUpperCase();
        return [ (name || 'GIVEN NAME SURNAME'), (cert || 'CERTIFICATE NAME'), 'APPLICATION NO' ].join(' - ');
      }, [fields, values, extractStudent]);

      const copyDraftName = useCallback(async () => {
        const draft = buildDraftName();
        try {
          if (navigator.clipboard && navigator.clipboard.writeText) {
            await navigator.clipboard.writeText(draft);
          } else {
            const ta = document.createElement('textarea');
            ta.value = draft; ta.style.position = 'fixed'; ta.style.opacity = '0';
            document.body.appendChild(ta); ta.select();
            document.execCommand('copy'); document.body.removeChild(ta);
          }
          showToast('Copied: ' + draft, 'ok');
        } catch (e) {
          showToast('Draft: ' + draft, 'ok');
        }
      }, [buildDraftName]);

      const onExport = useCallback(async () => {
        if (errors.length) {
          showToast(errors.length + ' field' + (errors.length === 1 ? '' : 's') + ' need attention', 'err');
          return;
        }
        setBusy(true);
        try {
          const out = await fillPdf(pdfBytes, fields, values);
          const { first, last, dob } = extractStudent();
          const formTitle = (loadedTplName || fileName.replace(/\.pdf$/i, '') || 'Form');
          let outName;
          if (first || last) {
            const who = [first, last].filter(Boolean).join('_').replace(/[^\w\-]+/g, '');
            outName = who + ' ' + formTitle + '.pdf';
          } else {
            const stamp = new Date().toISOString().slice(0, 10);
            outName = formTitle + '_filled_' + stamp + '.pdf';
          }
          downloadBytes(out, outName);
          // Fire-and-forget audit log: who filled which form for which student.
          logFill({
            staff_name: SB_USER || null,
            form_name: formTitle,
            student_first: first || null,
            student_last: last || null,
            student_dob: dob || null,
          });
          showToast('Filled PDF downloaded', 'ok');
          setTimeout(() => { if (confirm('Exported! Clear the form for the next person?')) clearValues(true); }, 300);
        } catch (e) {
          console.error(e);
          showToast('Export failed: ' + e.message, 'err');
        }
        setBusy(false);
      }, [pdfBytes, fields, values, fileName, errors, loadedTplName, extractStudent]);

      // Return to the DB form list.
      const onReset = useCallback(() => {
        if (!confirm('Close this form and go back to the form list?')) return;
        setPdfBytes(null); setPdfJsDoc(null);
        setOriginalFields([]); setFields([]); setGroups([]);
        setFileName(''); setValues({}); setPendingSuggestions([]);
        setLoadedTplId(null); setLoadedTplName(null);
      }, []);

      const clearValues = useCallback((silent) => {
        if (!silent && !confirm('Clear all filled values? The form stays loaded.')) return;
        setValues(seedAutoValues(fields));   // keep today's dates for the next person
        if (!silent && typeof showToast === 'function') showToast('Form cleared', 'ok');
      }, [fields]);

      // Merge AI-returned values into the form, skipping the synthetic Course
      // field's absence gracefully; count how many actually landed.
      const applyParsedValues = useCallback((parsed) => {
        const vals = (parsed && parsed.values) || {};
        const validNames = new Set(fields.map(f => f.name));
        let n = 0;
        setValues(prev => {
          const next = { ...prev };
          for (const k of Object.keys(vals)) {
            if (validNames.has(k)) { next[k] = vals[k]; n++; }
          }
          // keep auto-dated fields on today's date if the sheet didn't supply one
          const today = todayISO();
          for (const f of fields) {
            if (isAutoDateField(f) && (next[f.name] == null || next[f.name] === '')) next[f.name] = today;
          }
          // mirror the top full name into the bottom name field
          applyNameMirror(fields, next);
          return next;
        });
        return n;
      }, [fields]);

      const runAutofillText = useCallback(async () => {
        const text = autofillText.trim();
        if (!text) { showToast('Paste the enrolment sheet first', 'err'); return; }
        setAutofillBusy(true);
        try {
          const parsed = await parseEnrolment({ fields, text });
          const n = applyParsedValues(parsed);
          setShowAutofill(false);
          setAutofillText('');
          showToast(n ? ('Autofilled ' + n + ' field' + (n === 1 ? '' : 's') + ' — please review') : 'No matching fields found', n ? 'ok' : 'err');
        } catch (e) {
          console.error(e);
          showToast('Autofill failed: ' + e.message, 'err');
        }
        setAutofillBusy(false);
      }, [autofillText, fields, applyParsedValues]);

      const runAutofillFile = useCallback(async (file) => {
        if (!file) return;
        setAutofillBusy(true);
        try {
          const buf = await file.arrayBuffer();
          const isDocx = /\.docx$/i.test(file.name)
            || file.type === 'application/vnd.openxmlformats-officedocument.wordprocessingml.document';
          let parsed;
          if (isDocx) {
            // .docx is a zip of XML — the backend can't read it. Extract the
            // text in-browser with mammoth and send that as plain text instead.
            if (!window.mammoth) throw new Error('Word reader not loaded — paste the text or use a PDF');
            const res = await window.mammoth.extractRawText({ arrayBuffer: buf });
            const text = (res && res.value || '').trim();
            if (!text) throw new Error('No text found in that Word file');
            parsed = await parseEnrolment({ fields, text });
          } else {
            const bytes = new Uint8Array(buf);
            let bin = '';
            for (let i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
            const b64 = btoa(bin);
            parsed = await parseEnrolment({ fields, fileBase64: b64, docMime: file.type || '' });
          }
          const n = applyParsedValues(parsed);
          setShowAutofill(false);
          setAutofillText('');
          showToast(n ? ('Autofilled ' + n + ' field' + (n === 1 ? '' : 's') + ' — please review') : 'No matching fields found', n ? 'ok' : 'err');
        } catch (e) {
          console.error(e);
          showToast('Autofill failed: ' + e.message, 'err');
        }
        setAutofillBusy(false);
      }, [fields, applyParsedValues]);

      const handleFieldClick = useCallback((fieldName) => {
        let targetName = fieldName;
        for (const f of fields) {
          if (f.isGroup && f.memberMap && Object.values(f.memberMap).includes(fieldName)) {
            targetName = f.name;
            break;
          }
        }
        setHighlight(targetName);
        setTimeout(() => {
          const el = document.querySelector('[data-row="' + targetName + '"]');
          if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }, 50);
      }, [fields]);

      return (
        <div className="app">
          <header className="header">
            <div className="header-left">
              <span className="logo" onClick={() => pdfBytes && onReset()}>form<em>Craft</em></span>
              {fileName && (
                <React.Fragment>
                  <div className="header-divider" />
                  <span className="header-file"><span className="dot" />{loadedTplName || fileName}</span>
                </React.Fragment>
              )}
              {pdfBytes && (
                <React.Fragment>
                  <div className="header-divider" />
                  <div className="mode-switch">
                    <button className={mode === 'fill' ? 'active' : ''} onClick={() => setMode('fill')}><i className="fa-solid fa-pen-to-square" /> Fill</button>
                    <button className={mode === 'edit' ? 'active' : ''} onClick={() => setMode('edit')}><i className="fa-solid fa-sliders" /> Edit fields</button>
                  </div>
                </React.Fragment>
              )}
            </div>
            <div className="header-right">
              {pdfBytes && (
                <React.Fragment>
                  <button className="btn btn-ghost" onClick={openLibrary}><i className="fa-solid fa-folder-open" /> Team forms{library.length ? ' (' + library.length + ')' : ''}</button>
                  <button className="btn btn-ghost" onClick={saveTemplate}><i className="fa-solid fa-save" /> Save form</button>
                  {mode === 'fill' && <button className="btn btn-ghost" onClick={() => setShowAutofill(true)} title="Read an enrolment sheet and fill the form"><i className="fa-solid fa-wand-magic-sparkles" /> Autofill from sheet</button>}
                  {mode === 'fill' && <button className="btn btn-ghost" onClick={copyDraftName} title="Copy: GIVEN SURNAME - CERTIFICATE - APPLICATION NO"><i className="fa-solid fa-copy" /> Draft name</button>}
                  {mode === 'fill' && <button className="btn btn-ghost" onClick={() => clearValues(false)} title="Empty the form, keep it loaded"><i className="fa-solid fa-eraser" /> Clear</button>}
                  <button className="btn btn-ghost" onClick={onReset}><i className="fa-solid fa-arrow-left" /> Form list</button>
                  <button className="btn btn-primary" onClick={onExport} disabled={busy || fields.length === 0}>
                    {busy
                      ? <React.Fragment><i className="fa-solid fa-spinner spinning" /> Working…</React.Fragment>
                      : <React.Fragment><i className="fa-solid fa-download" /> Export PDF</React.Fragment>}
                  </button>
                </React.Fragment>
              )}
            </div>
          </header>

          {showLibrary && (
            <div className="lib-overlay" onClick={() => setShowLibrary(false)}>
              <div className="lib-modal" onClick={(e) => e.stopPropagation()}>
                <div className="lib-head">
                  <div className="lib-icon"><i className="fa-solid fa-folder-open" /></div>
                  <div className="lib-titles">
                    <h3>Team forms</h3>
                    <div className="lib-sub">{library.length ? library.length + ' form' + (library.length === 1 ? '' : 's') : 'Shared across all staff'}</div>
                  </div>
                  <button className="lib-close" onClick={() => setShowLibrary(false)} aria-label="Close"><i className="fa-solid fa-xmark" /></button>
                </div>
                <div className="lib-body">
                  {libLoading
                    ? (
                      <div className="lib-empty">
                        <i className="fa-solid fa-spinner fa-spin" />
                        <p>Loading team forms…</p>
                      </div>
                    )
                    : library.length === 0
                    ? (
                      <div className="lib-empty">
                        <i className="fa-solid fa-folder-open" />
                        <p>No forms yet. Ask an admin to add one.</p>
                      </div>
                    )
                    : library.map(t => {
                        const mine = pdfBytes && t.pdf_fingerprint === pdfFingerprint(pdfBytes);
                        return (
                          <div key={t.id} className={'lib-row' + (mine ? ' match' : '')}>
                            <div className="lib-file"><i className="fa-solid fa-file-lines" /></div>
                            <div className="lib-info" onClick={() => applyCloudTemplate(t)}>
                              <div className="lib-name">{t.name}</div>
                              <div className="lib-meta">
                                {mine && <span className="lib-badge"><i className="fa-solid fa-check" />open now</span>}
                                <span>{t.created_by || 'staff'}</span>
                              </div>
                            </div>
                            <button className="lib-use" onClick={() => applyCloudTemplate(t)}>Open</button>
                            <button className="lib-del" onClick={() => removeTemplate(t)} aria-label="Delete"><i className="fa-solid fa-trash" /></button>
                          </div>
                        );
                      })}
                </div>
              </div>
            </div>
          )}

          {showAutofill && (
            <div className="lib-overlay" onClick={() => !autofillBusy && setShowAutofill(false)}>
              <div className="lib-modal" onClick={(e) => e.stopPropagation()}>
                <div className="lib-head">
                  <div className="lib-icon"><i className="fa-solid fa-wand-magic-sparkles" /></div>
                  <div className="lib-titles">
                    <h3>Autofill from enrolment sheet</h3>
                    <div className="lib-sub">Paste the sheet or upload a file — the form fills itself</div>
                  </div>
                  <button className="lib-close" onClick={() => setShowAutofill(false)} disabled={autofillBusy} aria-label="Close"><i className="fa-solid fa-xmark" /></button>
                </div>
                <div className="lib-body">
                  <textarea
                    className="form-input"
                    style={{ minHeight: 200, fontFamily: 'var(--font-mono)', fontSize: 12.5, lineHeight: 1.5 }}
                    placeholder="Paste the enrolment details here…"
                    value={autofillText}
                    onChange={(e) => setAutofillText(e.target.value)}
                    disabled={autofillBusy}
                  />
                  <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginTop: 14 }}>
                    <button className="btn btn-primary" onClick={runAutofillText} disabled={autofillBusy || !autofillText.trim()}>
                      {autofillBusy
                        ? <React.Fragment><i className="fa-solid fa-spinner spinning" /> Reading…</React.Fragment>
                        : <React.Fragment><i className="fa-solid fa-wand-magic-sparkles" /> Autofill from text</React.Fragment>}
                    </button>
                    <span style={{ fontSize: 12, color: 'var(--text-4)' }}>or</span>
                    <label className="btn btn-ghost" style={{ cursor: autofillBusy ? 'not-allowed' : 'pointer', margin: 0 }}>
                      <i className="fa-solid fa-file-arrow-up" /> Upload file
                      <input type="file" accept=".txt,.pdf,.docx,.png,.jpg,.jpeg,.webp,.gif,text/plain,application/pdf,application/vnd.openxmlformats-officedocument.wordprocessingml.document,image/*" style={{ display: 'none' }} disabled={autofillBusy}
                        onChange={(e) => { const f = e.target.files[0]; e.target.value = ''; runAutofillFile(f); }} />
                    </label>
                  </div>
                  <div style={{ fontSize: 11.5, color: 'var(--text-4)', marginTop: 14, lineHeight: 1.5 }}>
                    <i className="fa-solid fa-circle-info" style={{ marginRight: 5 }} />
                    Reads names, dates, contact details, USI, qualification and more, then maps them onto this form's fields. Always review before exporting — AI can misread.
                  </div>
                </div>
              </div>
            </div>
          )}

          {!pdfBytes ? (
            <FormListLanding onOpen={openDbForm} busy={busy} showToast={showToast} />
          ) : fields.length === 0 ? (
            busy ? (
              <div className="landing">
                <div className="landing-card">
                  <i className="fa-solid fa-spinner spinning" style={{ fontSize: 34, color: 'var(--accent)', marginBottom: 16 }} />
                  <h1 style={{ fontSize: 32 }}>Opening<br /><em>the form…</em></h1>
                  <p className="lead">Decoding the PDF and loading its fields.</p>
                </div>
              </div>
            ) : (
              <div className="landing">
                <div className="landing-card">
                  <i className="fa-solid fa-triangle-exclamation" style={{ fontSize: 38, color: 'var(--text-3)', marginBottom: 16 }} />
                  <h1 style={{ fontSize: 32 }}>No fillable<br /><em>fields found.</em></h1>
                  <p className="lead">This form's PDF doesn't have AcroForm fields. It needs to be prepared in Acrobat before it can be filled.</p>
                  <button className="btn btn-primary btn-lg" onClick={onReset}><i className="fa-solid fa-arrow-left" /> Back to form list</button>
                </div>
              </div>
            )
          ) : (
            <div className="workspace" style={{ '--form-w': formWidth + 'px' }}>
              <PdfPreview
                pdfJsDoc={pdfJsDoc}
                fields={fields}
                values={values}
                currentPage={currentPage}
                onPageChange={setCurrentPage}
                pageCount={pageCount}
                scale={scale}
                onZoom={(d) => setScale(s => Math.max(0.5, Math.min(2.5, +(s + d).toFixed(2))))}
                highlightedFieldName={highlight}
                onFieldClick={handleFieldClick}
                onValueChange={onChangeValue}
              />
              <div
                className={'divider' + (dragging ? ' dragging' : '')}
                onMouseDown={(e) => { e.preventDefault(); setDragging(true); }}
                title="Drag to resize"
              />
              <div className="form-pane" style={{ width: formWidth }}>
                <div className="form-pane-header">
                  <div className="form-pane-title">
                    {mode === 'fill' ? <React.Fragment>Fill the <em>form.</em></React.Fragment> : <React.Fragment>Edit <em>fields.</em></React.Fragment>}
                  </div>
                  <div className="form-pane-sub">
                    {mode === 'fill' ? 'Click any field on the PDF to jump to it here' : 'Rename labels, set required flags. Saves back to the form in the DB.'}
                  </div>
                  {mode === 'fill' && (
                    <div className="progress">
                      <div className="progress-track"><div className="progress-bar" style={{ width: (fields.length ? Math.round(filledCount / fields.length * 100) : 0) + '%' }} /></div>
                      <span className="progress-text">{filledCount} / {fields.length}</span>
                    </div>
                  )}
                </div>
                {mode === 'edit' && pendingSuggestions.map(s => (
                  <GroupSuggestion key={s.id} suggestion={s} fields={fields}
                                   onAccept={(label, optA, optB) => acceptSuggestion(s, label, optA, optB)}
                                   onDismiss={() => dismissSuggestion(s)} />
                ))}
                <div className="form-list">
                  {fields.map(f => (
                    <div key={f.name} data-row={f.name}>
                      <FormRow
                        field={f}
                        value={values[f.name]}
                        onChange={(v) => onChangeValue(f.name, v)}
                        mode={mode}
                        onUpdate={(patch) => updateField(f.name, patch)}
                        onDelete={() => ungroup(f.name)}
                        highlighted={highlight === f.name}
                        onClick={() => {
                          const w = f.widgets && f.widgets[0];
                          if (w && w.page !== currentPage) setCurrentPage(w.page);
                          setHighlight(f.name);
                        }}
                      />
                    </div>
                  ))}
                </div>
                <div className="form-footer">
                  <div className="form-footer-info">
                    {mode === 'fill'
                      ? <React.Fragment><strong>{filledCount}</strong> of <strong>{fields.length}</strong> filled{errors.length > 0 && <React.Fragment> · <span style={{ color: 'var(--err)' }}>{errors.length} need attention</span></React.Fragment>}</React.Fragment>
                      : <React.Fragment><strong>{fields.length}</strong> fields · <strong>{groups.length}</strong> grouped</React.Fragment>}
                  </div>
                  {mode === 'edit'
                    ? <button className="btn btn-primary" onClick={saveTemplate}><i className="fa-solid fa-save" /> Save form</button>
                    : <button className="btn btn-primary" onClick={onExport} disabled={busy}>
                        {busy
                          ? <React.Fragment><i className="fa-solid fa-spinner spinning" /> Working…</React.Fragment>
                          : <React.Fragment><i className="fa-solid fa-download" /> Export PDF</React.Fragment>}
                      </button>
                  }
                </div>
              </div>
            </div>
          )}

          {toast && (
            <div className={'toast ' + toast.type}>
              <i className={'fa-solid ' + (toast.type === 'ok' ? 'fa-circle-check' : toast.type === 'err' ? 'fa-circle-exclamation' : 'fa-circle-info')} />
              <span>{toast.msg}</span>
            </div>
          )}
        </div>
      );
    }

    // Landing = the DB form list. No uploads.
    function FormListLanding({ onOpen, busy, showToast }) {
      const [rows, setRows] = useState(null); // null = loading

      const load = useCallback(async () => {
        setRows(null);
        const r = await fetchTemplates(null);
        setRows(r);
      }, []);

      useEffect(() => { load(); }, [load]);

      return (
        <div className="landing">
          <div className="landing-card">
            <div className="eyebrow">PDF Form Filler · Team forms</div>
            <h1>Pick a form<br /><em>to fill.</em></h1>
            <p className="lead">Choose a team form below — it opens ready to fill, then exports a completed PDF.</p>

            <div className="db-forms">
              <div className="db-forms-label">
                <span>Team forms</span>
                <button className="btn btn-ghost" style={{ marginLeft: 'auto', padding: '4px 10px' }} onClick={load}>
                  <i className="fa-solid fa-rotate" /> Refresh
                </button>
              </div>

              {rows === null ? (
                <div className="db-empty">
                  <i className="fa-solid fa-spinner spinning" />
                  <p>Loading forms…</p>
                </div>
              ) : rows.length === 0 ? (
                <div className="db-empty">
                  <i className="fa-solid fa-folder-open" />
                  <p>No forms in the library yet. An admin needs to add one before staff can fill it.</p>
                </div>
              ) : (
                rows.map(t => {
                  const hasPdf = t.data && t.data.pdfBase64;
                  return (
                    <div key={t.id} className="db-form-card" onClick={() => hasPdf ? onOpen(t) : showToast('This form has no embedded PDF.', 'err')}>
                      <div className="db-form-icon"><i className="fa-solid fa-file-lines" /></div>
                      <div className="db-form-info">
                        <div className="db-form-name">{t.name}</div>
                        <div className="db-form-meta">{t.created_by ? 'Added by ' + t.created_by : 'Team form'}{!hasPdf ? ' · no PDF' : ''}</div>
                      </div>
                      <i className="fa-solid fa-arrow-right db-form-go" />
                    </div>
                  );
                })
              )}
            </div>

            <div className="features">
              <div className="feat"><i className="fa-solid fa-wand-magic-sparkles" /> Pre-set fields</div>
              <div className="feat"><i className="fa-solid fa-signature" /> Signatures</div>
              <div className="feat"><i className="fa-solid fa-clipboard-check" /> Fill logged</div>
              <div className="feat"><i className="fa-solid fa-lock" /> Fills in your browser</div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
